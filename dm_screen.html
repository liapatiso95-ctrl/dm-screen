    var weight="",cost="",descLines=[],attune=null,type="",rarity="",bonus="",damage="";
    var pastFields=false;
    for(var li=1;li<lines.length;li++){
      var ln=lines[li].trim();
      if(/^#/.test(ln)) break; // stop at next heading
      if(!pastFields){
        // Match bold fields with or without a value: **Field:** value OR **Field:**
        var kv=ln.match(/^\*\*([^*]+)\*\*[:\s]+(.+)$/)||ln.match(/^(Weight|Cost|Type|Rarity|Attunement|Bonus|Damage)[:\s]+(.+)$/i);
        var kvEmpty=!kv&&(ln.match(/^\*\*([^*]+)\*\*:?\s*$/)||ln.match(/^(Weight|Cost|Type|Rarity|Attunement|Bonus|Damage):\s*$/i));
        if(kv){
          var k=kv[1].toLowerCase().trim().replace(/:$/,""),v=kv[2].trim();
          if(k==="weight") weight=v.replace(/\s*(lb\.?|lbs\.?|pounds?)\s*$/i,"").trim();
          else if(k==="cost") cost=v;
          else if(k==="type") type=v;
          else if(k==="rarity") rarity=v;
          else if(k==="bonus") bonus=v;
          else if(k==="damage") damage=v;
          else if(k==="attunement") attune=/^(yes|true|required|requires)/i.test(v)?v:(/^(no|none|false)/i.test(v)?false:v);
          continue;
        }
        if(kvEmpty) continue; // empty field line — skip without flipping to description
        if(ln) pastFields=true;
      }
      if(pastFields){
        if(/^\\?(column|page)$/i.test(ln)||/^\{\{/.test(ln)) continue;
        if(ln) descLines.push(ln); // keep markdown intact
      }
    }
    // If rarity wasn't given but the Type field contains a rarity word, extract it
    if(!rarity&&type){
      var rm=type.match(/\b(Very Rare|Common|Uncommon|Rare|Legendary|Artifact)\b/i);
      if(rm){
        rarity=rm[1];
        // Remove the rarity (and a trailing/leading comma) from the type string
        type=type.replace(/\s*,?\s*\b(Very Rare|Common|Uncommon|Rare|Legendary|Artifact)\b\s*,?\s*/i," ").replace(/\s*,\s*$/,"").replace(/^\s*,\s*/,"").replace(/\s+/g," ").trim();
      }
    }
    var fullDesc=descLines.join("\n").trim();
    // Build header: "Type, Rarity" on first line, attunement on the next, then the description
    var headerLines=[];
    var meta=[type,rarity].filter(Boolean).join(", ");
    if(meta) headerLines.push("**Type:** "+meta);
    if(attune) headerLines.push("*(Requires Attunement"+(typeof attune==="string"&&attune.replace(/^(yes|true|required|requires attunement?)/i,"").trim()?" "+attune.replace(/^(yes|true|required|requires attunement?)/i,"").trim():"")+")*");
    if(headerLines.length>0) fullDesc=headerLines.join("\n")+(fullDesc?"\n"+fullDesc:"");
    // Skip stub entries: only a name, nothing else
    if(!descLines.length&&!weight&&!cost&&!type&&!rarity&&attune===null) return;
    // ── Parity with the JSON parser ──
    // attuneTag: searchable attunement requirement, stripped of a leading "by a/an"
    // and any generic yes/required wording (e.g. "by a Warlock" -> "Warlock").
    var attuneTag="";
    if(typeof attune==="string"){
      attuneTag=attune.replace(/^(yes|true|required|requires attunement?)\b[\s,:-]*/i,"")
                      .replace(/^by an?\s+/i,"").trim();
    }
    // charges: structured charge-tracker object derived from the description text,
    // exactly as the JSON parser falls back to when an item has no explicit count.
    var charges=parseChargesFromDesc(fullDesc);
    items[name.toLowerCase()]={name,weight,cost,type,rarity,attune:attune===false?false:(attune?true:null),attuneTag:attuneTag,desc:fullDesc,charges:charges,bonus:bonus,damage:damage,src:"local"};
  });
  return items;
}

// ─── 5etools JSON item source ─────────────────────────────────────────────────
const ITEM_JSON_BASE="https://raw.githubusercontent.com/liapatiso95-ctrl/character-sheet/main/items/";
const ITEM_JSON_INDEX=ITEM_JSON_BASE+"index.json";
const _ITEM_TYPE={A:"Ammunition",AF:"Ammunition",AT:"Artisan's Tools",EM:"Eldritch Machine",EXP:"Explosive",G:"Adventuring Gear",GS:"Gaming Set",GV:"Generic Variant",HA:"Heavy Armor",INS:"Instrument",LA:"Light Armor",M:"Melee Weapon",MA:"Medium Armor",MNT:"Mount",P:"Potion",R:"Ranged Weapon",RD:"Rod",RG:"Ring",S:"Shield",SC:"Scroll",SCF:"Spellcasting Focus",OTH:"Other",T:"Tool",TAH:"Tack and Harness",TG:"Trade Good",TB:"Trade Bar",FD:"Food and Drink",VEH:"Vehicle (Land)",SHP:"Vehicle (Water)",AIR:"Vehicle (Air)",SPC:"Vehicle (Space)",$:"Treasure","$A":"Treasure (Art Object)","$C":"Treasure (Coinage)","$G":"Treasure (Gemstone)",WD:"Wand"};
const _ITEM_DMG={A:"Acid",B:"Bludgeoning",C:"Cold",F:"Fire",O:"Force",L:"Lightning",N:"Necrotic",P:"Piercing",I:"Poison",Y:"Psychic",R:"Radiant",S:"Slashing",T:"Thunder"};
const _ITEM_PROP={T:"Thrown",V:"Versatile",H:"Heavy","2H":"Two-Handed",F:"Finesse",L:"Light",R:"Reach",A:"Ammunition",LD:"Loading",S:"Special",AF:"Ammunition (futuristic)",RLD:"Reload",BF:"Burst Fire",Vst:"Vestige of Divergence"};
const _ITEM_RECHARGE={round:"each round",restShort:"a short rest",restLong:"a long rest",dawn:"dawn",dusk:"dusk",midnight:"midnight"};

// Strip 5etools {@tag content|source|display} markup, keeping the best display text.
function strip5eTags(s){
  if(s==null) return "";
  var str=""+s;
  var prev=null;
  // Repeat until stable (handles nested tags)
  while(prev!==str){
    prev=str;
    str=str.replace(/\{@(\w+)\s*([^{}]*)\}/g,function(_,tag,body){
      tag=tag.toLowerCase();
      var parts=body.split("|");
      if(tag==="dc") return "DC "+body.trim();
      if(tag==="filter") return parts[0].trim();
      if(tag==="dice"||tag==="damage"||tag==="scaledice"||tag==="scaledamage"){
        // {@dice 1d3 + 2} or {@dice 1d6|display}
        return (parts.length>1?parts[parts.length-1]:parts[0]).trim();
      }
      if(tag==="chance"||tag==="recharge"){return parts[0].trim();}
      // {@quickref name|source|chapterIndex|headerIndex|displayText}
      // Use the explicit displayText (5th field) if present, else the name (1st).
      // The chapter/header fields are numeric indices and must never be shown.
      if(tag==="quickref"){
        if(parts.length>=5 && parts[4].trim()) return parts[4].trim();
        return parts[0].trim();
      }
      // Most tags: prefer explicit display text (last part if >1), else first part (the name)
      if(parts.length>=3 && parts[2].trim()) return parts[2].trim();
      if((tag==="item"||tag==="spell"||tag==="creature"||tag==="condition"||tag==="action"||tag==="variantrule"||tag==="filter"||tag==="book"||tag==="skill"||tag==="sense"||tag==="status")){
        // these may have a display override in part[1] for some, but name is part[0]
        return parts[0].trim();
      }
      return parts[0].trim();
    });
  }
  return str;
}

// Recursively flatten a 5etools entries array into clean paragraph text.
function flatten5eEntries(entries,out){
  out=out||[];
  if(entries==null) return out;
  if(typeof entries==="string"){var t=strip5eTags(entries).trim();if(t)out.push(t);return out;}
  if(Array.isArray(entries)){entries.forEach(function(e){flatten5eEntries(e,out);});return out;}
  if(typeof entries==="object"){
    var ty=entries.type;
    if(ty==="table"){
      var labels=(entries.colLabels||[]).map(function(l){return strip5eTags(l).trim();});
      var bodyRows=(entries.rows||[]).filter(Array.isArray).map(function(row){
        return row.map(function(cell){
          if(cell&&typeof cell==="object") return flatten5eEntries(cell,[]).join(" ").replace(/\s*\|\s*/g," / ").trim();
          return strip5eTags(cell).replace(/\s*\|\s*/g," / ").trim();
        });
      });
      var ncol=labels.length||(bodyRows[0]?bodyRows[0].length:0);
      if(ncol){
        var tl=[];
        if(entries.caption){var cap=strip5eTags(entries.caption).trim();if(cap)tl.push("**"+cap+"**");}
        var hdr=labels.slice(); while(hdr.length<ncol) hdr.push("");
        tl.push("| "+hdr.slice(0,ncol).join(" | ")+" |");
        tl.push("| "+hdr.slice(0,ncol).map(function(){return "---";}).join(" | ")+" |");
        bodyRows.forEach(function(r){var rr=r.slice(0,ncol);while(rr.length<ncol)rr.push("");tl.push("| "+rr.join(" | ")+" |");});
        out.push(tl.join("\n"));
      }
      return out;
    }
    if(ty==="list"&&Array.isArray(entries.items)){
      entries.items.forEach(function(it){
        if(typeof it==="string"){var s=strip5eTags(it).trim();if(s)out.push("- "+s);}
        else if(it&&typeof it==="object"){
          // A named list item: bullet with a bold run-in label.
          var label=it.name?strip5eTags(it.name).replace(/[.:]$/,"").trim():"";
          var body=flatten5eEntries(it.entries||it.entry||"",[]).join(" ").trim();
          if(label&&body) out.push("- **"+label+".** "+body);
          else if(label) out.push("- **"+label+"**");
          else if(body) out.push("- "+body);
        }
      });
      return out;
    }
    if(entries.entries||entries.items){
      // A named {name,entries} block is a run-in sub-header: ***Name.*** body…
      var inner=flatten5eEntries(entries.entries||entries.items,[]);
      if(entries.name){
        var nm=strip5eTags(entries.name).replace(/[.:]$/,"").trim();
        if(nm){
          var heading="***"+nm+".***";
          if(inner.length&&!/^(\s*[-|]|\*\*\*)/.test(inner[0])) inner[0]=heading+" "+inner[0];
          else inner.unshift(heading);
        }
      }
      for(var qi=0;qi<inner.length;qi++) out.push(inner[qi]);
      return out;
    }
    if(entries.entry){flatten5eEntries(entries.entry,out);return out;}
  }
  return out;
}

// Convert a 5etools value (in copper) to a clean coin string.
function copperToCoin(cp){
  if(cp==null) return "";
  var n=Number(cp);if(!isFinite(n)||n<=0) return "";
  if(n%100===0) return (n/100)+" gp";
  if(n>=100) return (n/100)+" gp";       // e.g. 150 -> 1.5 gp
  if(n%10===0) return (n/10)+" sp";        // e.g. 20 -> 2 sp
  return n+" cp";                          // e.g. 2 -> 2 cp
}

// Decode the attunement requirement tag for searching.
function attuneTagText(item){
  if(!item.reqAttuneTags||!item.reqAttuneTags.length) {
    if(typeof item.reqAttune==="string"){return item.reqAttune.replace(/^by an?\s+/i,"").trim();}
    return "";
  }
  return item.reqAttuneTags.map(function(t){
    if(t.spellcasting) return "Spellcaster";
    if(t.class) return (""+t.class).split("|")[0];
    if(t.race) return (""+t.race).split("|")[0];
    if(t.background) return (""+t.background).split("|")[0];
    if(t.alignment) return (Array.isArray(t.alignment)?t.alignment.join(" "):t.alignment);
    return Object.values(t).map(function(v){return (""+v).split("|")[0];}).join(" ");
  }).filter(Boolean).join(", ");
}

function titleCase(s){return (""+s).replace(/\w\S*/g,function(w){return w.charAt(0).toUpperCase()+w.slice(1);});}

// Resolve a single 5etools _copy item against a name|source index of the raw pool.
// Inherits all base fields, overlays the child's own fields, then applies _mod
// (entries appendArr/prependArr/replaceArr + insertArr). Returns a plain merged object.
function resolve5eCopy(it,index,depth){
  if(!it||!it._copy||depth>5) return it;
  var key=((it._copy.name||"")+"|"+(it._copy.source||"")).toLowerCase();
  var base=index[key];
  if(!base) return it; // base not found — leave as-is
  // base may itself be a copy
  if(base._copy) base=resolve5eCopy(base,index,(depth||0)+1);
  // Deep-ish clone of base, then overlay child's own fields (except _copy)
  var merged=JSON.parse(JSON.stringify(base));
  Object.keys(it).forEach(function(k){ if(k!=="_copy") merged[k]=it[k]; });
  delete merged._copy;
  delete merged.reprintedAs; // the copy is its own item, not a reprint
  // Apply _mod
  var mod=it._copy._mod;
  if(mod){
    Object.keys(mod).forEach(function(field){
      var ops=Array.isArray(mod[field])?mod[field]:[mod[field]];
      ops.forEach(function(op){
        if(!op||typeof op!=="object"){return;}
        var cur=merged[field];
        if(!Array.isArray(cur)) cur=(cur==null?[]:[cur]);
        var addItems=op.items==null?[]:(Array.isArray(op.items)?op.items:[op.items]);
        if(op.mode==="appendArr") merged[field]=cur.concat(addItems);
        else if(op.mode==="prependArr") merged[field]=addItems.concat(cur);
        else if(op.mode==="replaceArr"||op.mode==="replaceTxt") merged[field]=addItems;
        else if(op.mode==="insertArr"){
          var idx=(op.index==null?cur.length:op.index);
          var copy=cur.slice(); copy.splice.apply(copy,[idx,0].concat(addItems)); merged[field]=copy;
        }
      });
    });
  }
  return merged;
}

// Substitute 5etools {=field} and {=field/modifier} template variables from a context object.
function subTemplateVars(str,ctx){
  if(typeof str!=="string") return str;
  return str.replace(/\{=([\w]+)(?:\/([\w]+))?\}/g,function(_,key,mod){
    var v=ctx[key];
    if(v==null) return "";
    v=""+v;
    if(mod==="lowercase") v=v.toLowerCase();
    else if(mod==="title") v=v.replace(/\w\S*/g,function(w){return w.charAt(0).toUpperCase()+w.slice(1);});
    return v;
  });
}
// Deep template substitution across an inherits object's entries.
function subTemplateDeep(val,ctx){
  if(typeof val==="string") return subTemplateVars(val,ctx);
  if(Array.isArray(val)) return val.map(function(x){return subTemplateDeep(x,ctx);});
  if(val&&typeof val==="object"){var o={};Object.keys(val).forEach(function(k){o[k]=subTemplateDeep(val[k],ctx);});return o;}
  return val;
}
// Does a base item satisfy a magicvariant's requires/excludes entry?
function baseMatchesReq(base,req){
  return Object.keys(req).every(function(k){
    var want=req[k];
    if(k==="type"){var bt=(base.type||"").split("|")[0];return bt===(""+want).split("|")[0];}
    if(k==="property"){var bp=(base.property||[]).map(function(p){return (""+p).split("|")[0];});return bp.indexOf((""+want).split("|")[0])>=0;}
    if(k==="dmgType") return base.dmgType===want;
    if(k==="weaponCategory") return base.weaponCategory===want;
    if(k==="name"){var names=Array.isArray(want)?want:[want];return names.indexOf(base.name)>=0;}
    if(k==="source"){var srcs=Array.isArray(want)?want:[want];return srcs.indexOf(base.source)>=0;}
    // boolean flags: armor, weapon, sword, bow, axe, spear, etc. — base must have the same truthy flag
    if(want===true) return base[k]===true;
    if(want===false) return !base[k];
    return base[k]===want;
  });
}
function baseMatchesVariant(base,variant){
  var reqs=variant.requires||[];
  var ok=reqs.length===0||reqs.some(function(r){return baseMatchesReq(base,r);});
  if(!ok) return false;
  var exc=variant.excludes;
  if(exc){
    // excludes is a single object; any matching key disqualifies
    var hit=Object.keys(exc).some(function(k){
      var want=exc[k];var r={};r[k]=want;return baseMatchesReq(base,r);
    });
    if(hit) return false;
  }
  return true;
}
// Generate concrete items from a magicvariant applied to all matching base items.
function expandMagicVariant(variant,baseItems){
  var out=[];
  var inh=variant.inherits||{};
  baseItems.forEach(function(base){
    if(!baseMatchesVariant(base,variant)) return;
    // Build the context for template vars: base fields + inherited bonus fields
    var ctx=Object.assign({},base,inh);
    // Merge: start from base, overlay inherited (template-substituted) fields
    var merged=JSON.parse(JSON.stringify(base));
    Object.keys(inh).forEach(function(k){
      if(/^name(Prefix|Suffix|Remove|Add)/.test(k)) return; // name controls handled below
      if(k==="entries"){ merged.entries=subTemplateDeep(inh.entries,ctx); return; }
      merged[k]=subTemplateDeep(inh[k],ctx);
    });
    // Build the name
    var nm=base.name;
    if(inh.nameRemove){ nm=nm.replace(new RegExp(inh.nameRemove.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"g"),""); }
    if(inh.namePrefix) nm=inh.namePrefix+nm;
    if(inh.nameSuffix) nm=nm+inh.nameSuffix;
    merged.name=nm;
    merged.source=inh.source||variant.source||base.source;
    delete merged.reprintedAs; // generated item is its own thing
    delete merged._copy;
    merged._generated=true;
    out.push(merged);
  });
  return out;
}

// Resolve {#itemEntry Name|Source} references in an item's entries.
// Looks up the itemEntry definition's entriesTemplate, substitutes {{item.X}}
// variables from the referencing item's own fields, and returns the expanded entries array.
function resolveItemEntryRefs(entries,item,entryIndex){
  if(!Array.isArray(entries)) return entries;
  var out=[];
  entries.forEach(function(e){
    if(typeof e==="string"){
      var m=e.match(/^\{#itemEntry\s+([^|}]+)(?:\|([^}]+))?\}$/);
      if(m){
        var nm=m[1].trim(), src=(m[2]||"").trim();
        var def=entryIndex[(nm+"|"+src).toLowerCase()]||entryIndex[nm.toLowerCase()+"|"];
        if(!def){ // try any source
          var k=Object.keys(entryIndex).find(function(key){return key.indexOf(nm.toLowerCase()+"|")===0;});
          if(k) def=entryIndex[k];
        }
        if(def){
          var tmpl=def.entriesTemplate||def.entries||[];
          var filled=subItemEntryVars(tmpl,item);
          (Array.isArray(filled)?filled:[filled]).forEach(function(x){out.push(x);});
          return;
        }
        // unresolved — drop the raw token rather than show it
        return;
      }
    }
    out.push(e);
  });
  return out;
}
// Substitute {{item.field}} and {{func item.field}} placeholders deeply from the item's own fields.
function subItemEntryVars(val,item){
  if(typeof val==="string"){
    return val.replace(/\{\{(?:(\w+)\s+)?item\.(\w+)\}\}/g,function(_,fn,f){
      var v=item[f];
      if(v==null) return "";
      // Format arrays (e.g. resist:["acid","cold"]) as a readable list.
      if(Array.isArray(v)){
        var parts=v.map(function(x){return (""+x).split("|")[0];});
        if(parts.length<=1) return parts.join("");
        if(parts.length===2) return parts[0]+" and "+parts[1];
        return parts.slice(0,-1).join(", ")+", and "+parts[parts.length-1];
      }
      return (""+v).split("|")[0];
    });
  }
  if(Array.isArray(val)) return val.map(function(x){return subItemEntryVars(x,item);});
  if(val&&typeof val==="object"){var o={};Object.keys(val).forEach(function(k){o[k]=subItemEntryVars(val[k],item);});return o;}
  return val;
}

// Infer a sensible weight (lb) for an item lacking one, from its name/type.
// Returns a number. typeCode is the decoded 5etools type code; flags carries boolean type-flags.
function inferItemWeight(name,typeCode,flags){
  var n=(name||"").toLowerCase();
  flags=flags||{};
  function has(re){return re.test(n);}
  // Weapons & Armor
  if(has(/\bpadded armor\b/)) return 8;
  if(has(/\bleather armor\b/)) return 10;
  if(has(/\bstudded leather armor\b/)) return 13;
  if(has(/\bhide armor\b/)) return 12;
  if(has(/\b(chain shirt|breast ?plate)\b/)) return 20;
  if(has(/\bscale mail armor\b/)) return 45;
  if(has(/\b(half ?plate armor|ring ?mail armor)\b/)) return 40;
  if(has(/\bchain ?mail armor\b/)) return 55;
  if(has(/\bsplint armor\b/)) return 60;
  if(has(/\bplate armor\b/)) return 65;
  if(has(/\bshield\b/)) return 6;
  if(has(/\b(dagger|blowgun|dart)\b/)) return 1;
  if(has(/\b(club|handaxe|light hammer|sickle|shortsword|rapier|war pick|warhammer|hand crossbow|shortbow)\b/)) return 2;
  if(has(/\b(spear|scimitar|whip|longsword|trident)\b/)) return 3;
  if(has(/\b(battleaxe|morningstar|mace)\b/)) return 4;
  if(has(/\blight crossbow\b/)) return 5;
  if(has(/\b(glaive|halberd|greatsword|lance)\b/)) return 6;
  if(has(/\bgreataxe\b/)) return 7;
  if(has(/\b(greatclub|maul)\b/)) return 10;
  if(has(/\b(pike|heavy crossbow)\b/)) return 18;
  // Armor / shield by type code
  if(typeCode==="LA") return 10;
  if(typeCode==="MA") return 30;
  if(typeCode==="HA") return 60;
  if(typeCode==="S") return 6;
  if(has(/\bceremonial armor\b/)) return 20;
  // Minor Items
  if(has(/\bstatuette\b/)) return 8;
  if(has(/\bmusic box\b/)) return 1;
  if(has(/\b(painting|tapestry)\b/)) return 6;
  // Containers
  if(has(/\bsatchel\b/)) return 3;
  if(has(/\bback ?pack\b/)) return 5;
  if(has(/\b(bag|sack|pouch|haversack)\b/)) return 1;
  if(has(/\bchest\b/)) return 25;
  if(has(/\bbarrel\b/)) return 70;
  if(has(/\bcrate\b/)) return 40;
  if(has(/\bbox\b/)) return 10;
  if(has(/\bdeck\b/)) return 0.2;
  // Worn / apparel
  if(has(/\b(robe|robes)\b/)) return 3;
  if(has(/\b(cloak|cape|coat|mantle)\b/)) return 3;
  if(has(/\b(clothes|clothing|outfit|garb|vestments?)\b/)) return 3;
  if(has(/\b(boots|shoes|slippers|sandals)\b/)) return 2;
  if(has(/\b(gloves|gauntlets?)\b/)) return 1;
  if(has(/\bwraps\b/)) return 0.5;
  if(has(/\bbelt\b/)) return 1;
  if(has(/\b(mask|circlet|headpiece|hat|murmur)\b/)) return 1;
  if(has(/\b(crown|helmet)\b/)) return 4;
  if(has(/\b(eye[- ]?patch|eyepatch)\b/)) return 0.2;
  // Jewelry (check specific before generic)
  if(has(/\bring\b/)||typeCode==="RG") return 0.05;
  if(has(/\bearring\b/)) return 0.05;
  if(has(/\bamulet\b/)) return 1;
  if(has(/\b(necklace|pendant|periapt|medallion|talisman)\b/)) return 0.5;
  if(has(/\b(bracelet|bangle|armlet)\b/)) return 0.5;
  if(has(/\bbrooch\b/)) return 0.5;
  if(has(/\b(tattoo|needle)\b/)||flags.tattoo) return 0.05;
  // Consumables
  if(has(/\b(scroll)\b/)||typeCode==="SC") return 0.1;
  if(has(/\bpotion\b/)||typeCode==="P") return 0.5;
  if(has(/\boil\b/)) return 0.5;
  if(has(/\bpoison\b/)||flags.poison) return 0.5;
  // Implements
  if(has(/\bstaff\b/)||flags.staff||typeCode==="ST") return 4;
  if(has(/\bwand\b/)||typeCode==="WD") return 1;
  if(has(/\brod\b/)||typeCode==="RD") return 2;
  // Food
  if (typeCode==="FD") return 1;
  // Treasure
  if(typeCode==="$G") return 0.01;
  if(typeCode==="$C") return 0.02;
  if(has(/\bidol\b/)) return 2;
  if(has(/\btablet\b/)) return 3;
  if(has(/\bhand ?mirror\b/)) return 0.5;
  if(has(/\bmirror\b/)) return 1;
  if(has(/\b(lens|dice)\b/)) return 0.1;
  if(has(/\bcrystal ball\b/)) return 5;
  // Various Items
  if(has(/\borb\b/)) return 3;
  if(has(/\b(crystal|shard)\b/)) return 1;
  if(has(/\b(figurine|totem)\b/)) return 1;
  if(has(/\bcompass\b/)) return 1;
  if(has(/\b(spellbook|book|grimoire)\b/)) return 3;
  if(has(/\btome\b/)) return 5;
  if(has(/\bmanual\b/)) return 3;
  if(has(/\blantern\b/)) return 2;
  if(has(/\bhorn\b/)) return 2;
  if(has(/\binstrument\b/) ||typeCode==="INS") return 3;
  // Treasure (Art)
  if(typeCode==="$A") return 2;
  // Stones
  if(has(/\bioun stone\b/)) return 0;
  if(has(/\bstone\b/)) return 1;
  if(has(/\bgem\b/)) return 0.01;
  // Artisan's tools
  if(typeCode==="AT"||has(/\b(tools|supplies|kit)\b/)) return 6;
  // Spellcasting focus
  if(flags.scf||typeCode==="SCF") return 2;
  // Wondrous fallback
  if(flags.wondrous) return 4;
  // Final fallback
  return 5;
}

// Parse the 5etools items.json into our item shape.
// True only when entries contain an actual "pick from these options" block — a
// table or list. A nested {type:"entries"} sub-section (e.g. a Curse/Wish block
// on a magic weapon) is ordinary description text and does NOT count. This is the
// test for whether a generic parent (item group / variant) is worth showing.
function entriesHaveList(entries){
  if(!Array.isArray(entries)) return false;
  for(var i=0;i<entries.length;i++){
    var e=entries[i];
    if(e&&typeof e==="object"&&(e.type==="table"||e.type==="list")) return true;
  }
  return false;
}

// Map of base-weapon / base-armor name -> stats, populated while parsing JSON items. Used to
// enrich markdown items that name a base weapon/armor in parentheses, e.g. "Flame Tongue (Longsword)".
var _weaponStatsByName={};
var _armorStatsByName={};
function _buildItemCombatLine(it,dmgOverride){
  it=it||{};
  var combat="";
  if(dmgOverride) combat=(""+dmgOverride).trim();
  else if(it.dmg1){
    var dt=_ITEM_DMG[(it.dmgType||"").toUpperCase()]||"";
    combat=it.dmg1+(dt?" "+dt:"");
    if(it.dmg2) combat+=" (Versatile "+it.dmg2+")";
  }
  if(!combat) return it.bonusWeapon?(it.bonusWeapon+" to weapon attack & damage rolls"):"";
  var props=(it.property||[]).map(function(p){return _ITEM_PROP[(""+p).split("|")[0]]||(""+p).split("|")[0];}).filter(Boolean);
  if(it.range) props.push("Range "+it.range);
  if(props.length) combat+=" · "+props.join(", ");
  var mast=(it.mastery||[]).map(function(m){return (""+m).split("|")[0];}).filter(Boolean);
  if(mast.length) combat+=" · **Mastery:** "+mast.join(", ");
  if(it.bonusWeapon) combat+=" · "+it.bonusWeapon+" to attack & damage";
  return combat;
}
function _buildItemAcLine(a){
  if(!a||a.ac==null) return "";
  var acVal=""+a.ac;
  if(a.typeCode==="LA") acVal+=" + Dex modifier";
  else if(a.typeCode==="MA") acVal+=" + Dex modifier (max 2)";
  else if(a.typeCode==="S") acVal=(/^[+-]/.test(""+a.ac)?"":"+")+a.ac;
  return "**Armor Class:** "+acVal;
}
// After both sources load, enrich markdown items. The base weapon/armor is read from the
// Type line (e.g. "**Type:** Weapon (Rapier)" or "Armor (Plate)" or "Shield"), giving that
// item's damage/AC line; a "+N" in the name or type adds "+N to attack & damage" (weapons)
// or "+N AC" (armor/shields).
function _enrichMdItemsWithWeaponStats(){
  var data=_itemCache.data; if(!data) return;
  Object.keys(data).forEach(function(k){
    var it=data[k];
    if(!it||it.src==="json"||it._weaponEnriched||!it.desc) return;
    it._weaponEnriched=true;
    var nm=it.name||"";
    var typeM=it.desc.match(/\*\*Type:\*\*\s*([^\n]*)/i);
    var typeLine=typeM?typeM[1]:"";
    // Base item from the Type line's parenthetical; fall back to a name parenthetical.
    var parenM=typeLine.match(/\(([^)]+)\)/)||nm.match(/\(([^)]+)\)/);
    var baseKey=parenM?parenM[1].trim().toLowerCase():"";
    var isShield=/\bshield\b/i.test(typeLine);
    var isArmor=/\barmou?r\b/i.test(typeLine)||isShield;
    var isWeapon=/\bweapon\b/i.test(typeLine);
    var wStats=_weaponStatsByName[baseKey];
    var aStats=_armorStatsByName[baseKey]||(isShield?_armorStatsByName["shield"]:null);
    var hasDmgField=!!(it.damage&&(""+it.damage).trim());
    var bonus=(it.bonus&&(""+it.bonus).trim())?(""+it.bonus).trim():"";
    var lines=[];
    var statLine="";
    if(isWeapon||wStats||hasDmgField){
      // Author-supplied Damage overrides the base's dice/type; properties & mastery still
      // fill in from the base (only what's missing) — mirroring the JSON gap-fill.
      statLine=_buildItemCombatLine(wStats||{},hasDmgField?(""+it.damage).trim():"");
    } else if((isArmor||aStats)&&!/\*\*Armor Class:\*\*/.test(it.desc)){
      statLine=aStats?_buildItemAcLine(aStats):"";
    }
    // Magic bonus (verbatim from the "Bonus" field) rides on the SAME line, right after
    // mastery/AC — matching the JSON layout. Standalone only when there's no stat line.
    if(statLine){
      if(bonus) statLine+=" · "+bonus;
      lines.push(statLine);
    } else if(bonus){
      lines.push(bonus);
    }
    // Charges line (mirrors JSON), when the description implies charges and none is shown yet.
    if(it.charges&&it.charges.max&&!/\*\*Charges:\*\*/.test(it.desc)){
      var chLine="**Charges:** "+it.charges.max;
      if(it.charges.restore){
        var tm=it.desc.toLowerCase().match(/at (dawn|dusk|midnight|sunrise|sunset|nightfall)/);
        chLine+=" (regains "+it.charges.restore+(tm?" at "+tm[1]:"")+")";
      }
      lines.push(chLine);
    }
    if(!lines.length) return;
    // Insert right after the Type/attunement header, before the body (blank-separated),
    // since the markdown desc separates header from body with only a single newline.
    var dlines=it.desc.split("\n");
    var hEnd=-1;
    for(var di=0;di<dlines.length;di++){
      if(/^\*\*Type:\*\*/.test(dlines[di])){
        hEnd=di;
        while(hEnd+1<dlines.length&&/^\s*\*\(.*\)\*\s*$/.test(dlines[hEnd+1])) hEnd++;
        break;
      }
    }
    if(hEnd>=0){
      var block=lines.slice();
      if(hEnd+1<dlines.length&&dlines[hEnd+1].trim()!=="") block.push(""); // blank line before body
      Array.prototype.splice.apply(dlines,[hEnd+1,0].concat(block));
      it.desc=dlines.join("\n");
    } else {
      it.desc=lines.join("\n")+"\n\n"+it.desc;
    }
  });
}

// Accepts a JSON string OR an already-merged data object {item,baseitem,magicvariant,itemGroup}.
function parseItemJson(jsonOrData){
  var out={};
  _weaponStatsByName={}; _armorStatsByName={};
  var data;
  if(typeof jsonOrData==="string"){ try{data=JSON.parse(jsonOrData);}catch(e){return out;} }
  else data=jsonOrData||{};
  // Gather every item-bearing array from the file (all may coexist in one file).
  var items=Array.isArray(data)?data:(data.item||[]);
  var baseItems=(data&&data.baseitem)||[];
  var variants=(data&&data.magicvariant)||[];
  var groups=(data&&data.itemGroup)||[];
  var itemEntries=(data&&data.itemEntry)||[];
  // Index itemEntry definitions by name|source (lowercased) for {#itemEntry} resolution.
  var entryIndex={};
  itemEntries.forEach(function(e){ if(e&&e.name) entryIndex[((e.name||"")+"|"+(e.source||"")).toLowerCase()]=e; });
  if(!Array.isArray(items)) items=[];
  // Build a name|source index over the RAW item+base pool (incl. reprinted) for _copy inheritance.
  var index={};
  items.concat(baseItems).forEach(function(it){ if(it&&it.name) index[((it.name||"")+"|"+(it.source||"")).toLowerCase()]=it; });
  // Resolve _copy items.
  var resolvedItems=items.map(function(it){ return (it&&it._copy)?resolve5eCopy(it,index,0):it; });
  // Expand magicvariants against base items (no variant-on-variant chaining).
  var generated=[];
  variants.forEach(function(v){ generated=generated.concat(expandMagicVariant(v,baseItems)); });
  // ── Generic parents from magicvariants (Feature 1) ──
  // A magicvariant template (e.g. "Ammunition of Slaying") is shown as its own
  // generic entry ONLY when it is not reprinted elsewhere and its description
  // carries an actual list/table of options. Tagged generic:true so it appears
  // in the compendium only behind the "show generic items" toggle and never in
  // the inventory typeahead.
  var genericParents=[];
  variants.forEach(function(v){
    var inh=(v&&v.inherits)||{};
    if(inh.reprintedAs) return;            // superseded printing — ignore entirely
    if(!entriesHaveList(inh.entries)) return; // no option list — not worth showing generically
    if(!v.name) return;
    genericParents.push({
      name:v.name,
      type:"GV",                            // generic variant
      rarity:inh.rarity,
      reqAttune:inh.reqAttune,
      entries:inh.entries,
      _genericParent:true
    });
  });
  // Full raw pool to parse: concrete items, base items, then generated variants.
  var arr=resolvedItems.concat(baseItems).concat(generated);
  // Pre-pass: base weapon/armor stats. Skip reprinted printings, and for weapons PREFER the
  // entry that carries mastery (the 2024 weapons) so every reference — including 2014 magic
  // items — inherits it rather than matching an older, mastery-less printing.
  arr.forEach(function(it){
    if(!it||!it.name||it.reprintedAs) return;
    var key=it.name.toLowerCase();
    if(it.dmg1){
      var hasMast=!!(it.mastery&&it.mastery.length);
      var cur=_weaponStatsByName[key];
      if(!cur||(hasMast&&!(cur.mastery&&cur.mastery.length)))
        _weaponStatsByName[key]={dmg1:it.dmg1,dmgType:it.dmgType,dmg2:it.dmg2,property:it.property,range:it.range,mastery:it.mastery,bonusWeapon:it.bonusWeapon};
    }
    var tc=(it.type||"").split("|")[0];
    if(it.ac!=null&&/^(LA|MA|HA|S)$/.test(tc)&&!_armorStatsByName[key]) _armorStatsByName[key]={ac:it.ac,typeCode:tc};
  });
  arr.forEach(function(it){
    if(!it||!it.name) return;
    if(it.reprintedAs) return; // skip items that have been reprinted elsewhere
    if(out[it.name.toLowerCase()]) return; // first source wins (item > base > variant)
    var name=it.name;
    var typeCode=(it.type||"").split("|")[0];
    var isVehicleOrMount=/^(VEH|SHP|AIR|SPC|MNT)$/.test(typeCode);
    // weight (with optional multiplier / note); infer one when absent.
    var weight="", weightInferred=false;
    if(it.weight!=null) weight=""+it.weight;
    else if(it.weightMult!=null) weight="x"+it.weightMult;
    else if(!isVehicleOrMount){
      weight=""+inferItemWeight(name,typeCode,{wondrous:it.wondrous,staff:it.staff,tattoo:it.tattoo,poison:it.poison,scf:it.scfType!=null});
      weightInferred=true;
    }
    var header=[];
    // ── Type line ──
    // Primary type: Wondrous Item and Staff act as their own type name; otherwise the type code.
    var typeParts=[];
    // group(s) come first, e.g. group ["Holy Symbol"] => "Holy Symbol, Spellcasting Focus"
    var groupNames=Array.isArray(it.group)?it.group:(it.group?[it.group]:[]);
    groupNames.forEach(function(g){var gn=(""+g).split("|")[0].trim();if(gn)typeParts.push(titleCase(gn));});
    if(it.wondrous) typeParts.push("Wondrous Item");
    if(it.staff) typeParts.push("Staff");
    if(it.tattoo) typeParts.push("Tattoo");
    var typeName=_ITEM_TYPE[typeCode]||(typeCode?typeCode:"");
    var genericType=(typeCode==="G"||typeCode===""||typeCode==="OTH");
    var flagNamed=(it.staff||it.tattoo||groupNames.length>0);
    if(typeName && !((it.wondrous||flagNamed) && genericType)) typeParts.push(typeName);
    // Parenthetical descriptors: base item, then flag descriptors (poison, sentient, firearm, cursed)
    var parens=[];
    var baseItemName=it.baseItem?titleCase((""+it.baseItem).split("|")[0]):"";
    if(baseItemName) parens.push(baseItemName);
    if(it.poison) parens.push("Poison");
    if(it.sentient) parens.push("Sentient");
    if(it.firearm) parens.push("Firearm");
    if(it.curse) parens.push("Cursed");
    var typeStr=typeParts.join(", ");
    if(parens.length) typeStr+=(typeStr?" ":"")+"("+parens.join(", ")+")";
    var rarity=(it.rarity&&!/^(none|unknown|varies|unknown \(magic\))$/i.test(it.rarity))?titleCase(it.rarity):"";
    var typeLine="**Type:** "+[typeStr,rarity].filter(Boolean).join(", ");
    if(typeStr||rarity) header.push(typeLine.trim());
    // ── Attunement line ──
    if(it.reqAttune){
      if(it.reqAttune===true) header.push("*(Requires Attunement)*");
      else if(/^optional$/i.test(it.reqAttune)) header.push("*(Optional Attunement)*");
      else header.push("*(Requires Attunement "+strip5eTags(it.reqAttune).trim()+")*");
    }
    // ── Combat line (weapons) ──
    // Pull from the base weapon only what's MISSING — never overwrite stats the item
    // defines itself (some items intentionally redefine damage/type/properties).
    //  • If the item has its own combat stats, leave them; only add mastery (a 2024-only
    //    mechanic that older items can't carry on purpose) when absent.
    //  • If the item has no combat stats of its own (it relies on its baseItem), populate
    //    the full profile from the newest printing of that base.
    if(it.dmg1){
      if(!(it.mastery&&it.mastery.length)){
        var _bwm=_weaponStatsByName[(it.baseItem?(""+it.baseItem).split("|")[0]:name).toLowerCase()];
        if(_bwm&&_bwm.mastery&&_bwm.mastery.length) it.mastery=_bwm.mastery;
      }
    } else if(it.baseItem){
      var _bw=_weaponStatsByName[(""+it.baseItem).split("|")[0].toLowerCase()];
      if(_bw&&_bw.dmg1){
        it.dmg1=_bw.dmg1; it.dmgType=_bw.dmgType; it.dmg2=_bw.dmg2;
        it.property=_bw.property; it.range=_bw.range;
        if(_bw.mastery&&_bw.mastery.length) it.mastery=_bw.mastery;
      }
    }
    var combatLine=_buildItemCombatLine(it);
    if(combatLine) header.push(combatLine);
    // ── Armor line ──
    if(it.ac!=null||it.acSpecial){
      var acVal;
      if(it.acSpecial) acVal=strip5eTags(it.acSpecial);
      else {
        acVal=""+it.ac;
        // 5etools stores only the base number; the Dex rule comes from the armor type.
        if(typeCode==="LA") acVal+=" + Dex modifier";
        else if(typeCode==="MA") acVal+=" + Dex modifier (max 2)";
        else if(typeCode==="S") acVal=(/^[+-]/.test(""+it.ac)?"":"+")+it.ac; // shields add to AC
        // HA: flat number, no Dex
      }
      var acLine="**Armor Class:** "+acVal;
      if(it.strength) acLine+=" · Min. Strength "+it.strength;
      if(it.stealth) acLine+=" · Stealth Disadvantage";
      header.push(acLine);
    }
    // ── Vehicle / Mount stats ──
    if(isVehicleOrMount){
      var vstats=[];
      if(it.speed!=null) vstats.push("Speed "+it.speed+(typeCode==="MNT"?" ft.":" mph"));
      if(it.vehSpeed!=null) vstats.push("Speed "+it.vehSpeed+" mph");
      if(it.carryingCapacity!=null) vstats.push("Carrying Capacity "+it.carryingCapacity+" lb");
      if(it.capPassenger!=null) vstats.push("Passengers "+it.capPassenger);
      if(it.capCargo!=null) vstats.push("Cargo "+it.capCargo+" tons");
      if(it.crew!=null) vstats.push("Crew "+it.crew);
      else if(it.crewMin!=null||it.crewMax!=null) vstats.push("Crew "+(it.crewMin||"?")+"–"+(it.crewMax||"?"));
      if(it.vehAc!=null) vstats.push("AC "+it.vehAc);
      if(it.vehHp!=null) vstats.push("HP "+it.vehHp);
      if(it.vehDmgThresh!=null) vstats.push("Damage Threshold "+it.vehDmgThresh);
      if(vstats.length) header.push(vstats.join(" · "));
    }
    // ── Value ──
    var valStr=copperToCoin(it.value);
    if(valStr) header.push("**Value:** "+valStr+(it.valueMult?" (x"+it.valueMult+")":""));
    else if(it.valueMult) header.push("**Value:** x"+it.valueMult);
    // ── Charges note ──
    if(it.charges!=null){
      var chLine="**Charges:** "+it.charges;
      if(it.recharge) chLine+=" (regains"+(it.rechargeAmount?" "+strip5eTags(it.rechargeAmount):" all")+" at "+(_ITEM_RECHARGE[it.recharge]||it.recharge)+")";
      header.push(chLine);
    }
    // ── Body (entries + additionalEntries) ──
    var resolvedEntries=resolveItemEntryRefs(it.entries,it,entryIndex);
    var bodyArr=flatten5eEntries(resolvedEntries,[]);
    flatten5eEntries(it.additionalEntries,bodyArr);
    var body=bodyArr.join("\n");
    var fullDesc=header.join("\n")+(body?"\n\n"+body:"");
    // ── Structured charges for the tracker ──
    var charges=null;
    if(it.charges!=null&&Number(it.charges)>0){
      var restore="";
      if(it.rechargeAmount) restore=strip5eTags(it.rechargeAmount).replace(/\s+/g,"");
      else if(it.recharge) restore=String(it.charges); // regains all by default
      charges={enabled:true,max:String(it.charges),used:"0",restore:restore,msg:null};
    } else {
      charges=parseChargesFromDesc(body); // fallback: read the description
    }
    var attune=it.reqAttune?(it.reqAttune===true?true:(/^optional$/i.test(it.reqAttune)?true:true)):null;
    var storedType=typeStr;
    out[name.toLowerCase()]={
      name:name,weight:weight,cost:valStr,type:storedType||typeName,rarity:rarity,
      attune:attune,attuneTag:attuneTagText(it),desc:fullDesc,charges:charges,src:"json",weightInferred:weightInferred,source:it.source||""
    };
  });
  // ── itemGroup members: add only those not already present standalone. ──
  // The group's own entries/rarity describe the generated member. Skip members
  // that are just mundane equipment names with nothing to describe them.
  //
  // Feature 2 — reprinted groups are ignored: a group with `reprintedAs` is a
  // superseded printing, so its members are NOT injected from it. They survive
  // only if they also belong to a live (non-reprinted) group or already exist as
  // a standalone concrete item. First pass: collect the names that a live group
  // vouches for, so processing order doesn't matter.
  var liveGroupMembers={};
  groups.forEach(function(g){
    if(!g||!g.items||g.reprintedAs) return;
    g.items.forEach(function(m){
      var k=(""+m).split("|")[0].toLowerCase();
      if(k) liveGroupMembers[k]=true;
    });
  });
  // Members injected from a GV-typed group (e.g. "Armor of Resistance",
  // "Enspelled Weapon") are abstract "no particular item" generics — e.g.
  // "Armor of Acid Resistance" with no specific base armor. Flag them so they
  // can be shown in the compendium but kept out of the inventory entirely.
  var variantGenericMembers={};
  groups.forEach(function(g){
    if(!g||!g.items) return;
    if((""+(g.type||"")).split("|")[0]!=="GV") return;
    g.items.forEach(function(m){
      var k=(""+m).split("|")[0].toLowerCase();
      if(k) variantGenericMembers[k]=true;
    });
  });
  groups.forEach(function(g){
    if(!g||!g.items) return;
    var groupReprinted=!!g.reprintedAs;
    var groupDescArr=flatten5eEntries(g.entries,[]);
    var groupRarity=(g.rarity&&!/^(none|unknown|varies)$/i.test(g.rarity))?titleCase(g.rarity):"";
    var groupAttune=g.reqAttune?true:null;
    // Feature 1 — generic parent: a non-reprinted group whose entries carry an
    // actual list/table (e.g. "Armor of Resistance" with its d10 table) is shown
    // as its own generic:true entry — compendium-only (behind toggle), never in
    // inventory. Groups without an option list are not surfaced generically.
    if(!groupReprinted&&g.name&&entriesHaveList(g.entries)){
      var gpKey=g.name.toLowerCase();
      if(!out[gpKey]){
        var gpTypeCode=(""+(g.type||"")).split("|")[0];
        var gpTypeName=(gpTypeCode&&gpTypeCode!=="GV")?(_ITEM_TYPE[gpTypeCode]||""):"";
        var gpHdr=[];
        if(groupRarity||gpTypeName) gpHdr.push("**Type:** "+[gpTypeName,groupRarity].filter(Boolean).join(", "));
        if(groupAttune) gpHdr.push("*(Requires Attunement)*");
        var gpBody=groupDescArr.join("\n");
        out[gpKey]={
          name:g.name,weight:"",cost:"",type:gpTypeName,rarity:groupRarity,
          attune:groupAttune,attuneTag:(typeof g.reqAttune==="string"?g.reqAttune.replace(/^by an?\s+/i,"").trim():""),
          desc:(gpHdr.length?gpHdr.join("\n")+"\n\n":"")+gpBody,
          charges:parseChargesFromDesc(gpBody),src:"json",generic:true
        };
      }
    }
    g.items.forEach(function(m){
      var mname=(""+m).split("|")[0];
      if(!mname) return;
      var key=mname.toLowerCase();
      if(out[key]) return; // already a standalone item
      // Reprinted group: only inject this member if a live group also lists it.
      if(groupReprinted&&!liveGroupMembers[key]) return;
      // Skip junk: a member with no group description AND no rarity is just an equipment label
      if(groupDescArr.length===0&&!groupRarity) return;
      var gTypeCode=(""+(g.type||"")).split("|")[0];
      var gTypeName=(gTypeCode&&gTypeCode!=="GV")?(_ITEM_TYPE[gTypeCode]||""):"";
      var hdr=[];
      if(groupRarity||gTypeName) hdr.push("**Type:** "+[gTypeName,groupRarity].filter(Boolean).join(", "));
      var body=groupDescArr.join("\n");
      out[key]={
        name:mname,weight:"",cost:"",type:gTypeName,rarity:groupRarity,
        attune:groupAttune,attuneTag:(typeof g.reqAttune==="string"?g.reqAttune.replace(/^by an?\s+/i,"").trim():""),
        desc:(hdr.length?hdr.join("\n")+"\n\n":"")+body,charges:parseChargesFromDesc(body),src:"json",
        variantGeneric:variantGenericMembers[key]?true:undefined
      };
    });
  });
  // ── Generic parents from magicvariants (Feature 1) ──
  // Emitted last so a real concrete item of the same name always wins.
  genericParents.forEach(function(gp){
    var key=(gp.name||"").toLowerCase();
    if(!key||out[key]) return;
    var gpTypeCode=(""+(gp.type||"")).split("|")[0];
    var gpTypeName=(gpTypeCode&&gpTypeCode!=="GV")?(_ITEM_TYPE[gpTypeCode]||""):"";
    var gpRarity=(gp.rarity&&!/^(none|unknown|varies)$/i.test(gp.rarity))?titleCase(gp.rarity):"";
    var gpHdr=[];
    if(gpRarity||gpTypeName) gpHdr.push("**Type:** "+[gpTypeName,gpRarity].filter(Boolean).join(", "));
    if(gp.reqAttune) gpHdr.push("*(Requires Attunement)*");
    var gpBody=flatten5eEntries(gp.entries,[]).join("\n");
    out[key]={
      name:gp.name,weight:"",cost:"",type:gpTypeName,rarity:gpRarity,
      attune:gp.reqAttune?true:null,attuneTag:(typeof gp.reqAttune==="string"?gp.reqAttune.replace(/^by an?\s+/i,"").trim():""),
      desc:(gpHdr.length?gpHdr.join("\n")+"\n\n":"")+gpBody,
      charges:parseChargesFromDesc(gpBody),src:"json",generic:true
    };
  });
  return out;
}

// ─── Spell Scroll generation ───────────────────────────────────────────────────
// Per spell level: [rarity, save DC, attack bonus]. Index 0 = cantrip.
const _SCROLL_TABLE=[
  ["Common",13,5],    // Cantrip
  ["Common",13,5],    // 1st
  ["Uncommon",13,5],  // 2nd
  ["Uncommon",15,7],  // 3rd
  ["Rare",15,7],      // 4th
  ["Rare",17,9],      // 5th
  ["Very Rare",17,9], // 6th
  ["Very Rare",18,10],// 7th
  ["Very Rare",18,10],// 8th
  ["Legendary",19,11] // 9th
];
function _scrollLevelName(lv){return lv===0?"Cantrip":(lv===1?"1st":lv===2?"2nd":lv===3?"3rd":lv+"th")+" Level";}
function _scrollBoilerplate(lv){
  var row=_SCROLL_TABLE[lv]||_SCROLL_TABLE[0];
  var rarity=row[0], dc=row[1], atk=row[2];
  var lvlWord=lv===0?"cantrip":(_scrollLevelName(lv).replace(" Level","").toLowerCase()+"-level");
  var txt=
    "A Spell Scroll bears the words of a single spell, written in a mystical cipher. If the spell is on your spell list, you can read the scroll and cast its spell without Material components. Otherwise, the scroll is unintelligible. Casting the spell by reading the scroll requires the spell's normal casting time. Once the spell is cast, the words on the scroll fade, and the scroll itself crumbles to dust.\n\n"+
    "If the casting is interrupted, the scroll isn't lost. If the spell is on your spell list but of a higher level than you can normally cast, you must make an ability check using your spellcasting ability to determine whether you cast it successfully. The DC equals 10 plus the spell's level. On a failed check, the spell disappears from the scroll with no other effect.\n\n"+
    "The spell on the scroll is "+(/^8/.test(lvlWord)?"an ":"a ")+lvlWord+" spell. Its saving throw DC is "+dc+", and its attack bonus is +"+atk+".";
  return {rarity:rarity,text:txt};
}
// Build the spell's own block verbatim-style from parsed spell fields.
function _spellBlockText(sp){
  var lines=[];
  var lvlSchool=sp.level===0?(sp.school?sp.school+" Cantrip":"Cantrip"):(_scrollLevelName(sp.level).replace(" Level","")+"-level"+(sp.school?" "+sp.school:""));
  if(sp.ritual) lvlSchool+=" (ritual)";
  lines.push(lvlSchool);
  if(sp.castingTime) lines.push("Casting Time: "+sp.castingTime+(sp.ritual?" or Ritual":""));
  if(sp.range) lines.push("Range: "+sp.range);
  if(sp.components) lines.push("Components: "+sp.components);
  if(sp.duration) lines.push("Duration: "+(sp.conc?"Concentration, up to ":"")+sp.duration);
  if(sp.classes) lines.push("Classes: "+sp.classes);
  var head=lines.join("\n");
  return head+(sp.desc?"\n\n"+sp.desc:"");
}
// Generate spell-scroll items: one generic per level + one per spell in the cache.
function generateSpellScrolls(spellData){
  var out={};
  // Generic scrolls per level
  for(var lv=0;lv<=9;lv++){
    var bp=_scrollBoilerplate(lv);
    var nm="Spell Scroll ("+_scrollLevelName(lv)+")";
    out[nm.toLowerCase()]={name:nm,weight:""+inferItemWeight(nm,"SC",{}),weightInferred:true,cost:"",type:"Scroll",rarity:bp.rarity,attune:null,attuneTag:"",
      desc:"Type: Scroll, "+bp.rarity+"\n\n"+bp.text,charges:null,src:"json"};
  }
  // Per-spell scrolls
  if(spellData){
    Object.keys(spellData).forEach(function(k){
      var sp=spellData[k];
      if(!sp||!sp.name) return;
      var lv=sp.level||0;
      var bp=_scrollBoilerplate(lv);
      var nm="Spell Scroll ("+sp.name+")";
      out[nm.toLowerCase()]={
        name:nm,weight:""+inferItemWeight(nm,"SC",{}),weightInferred:true,cost:"",type:"Scroll",rarity:bp.rarity,attune:null,attuneTag:"",
        desc:"Type: Scroll, "+bp.rarity+"\n\n"+bp.text+"\n\n———\n"+sp.name+"\n"+_spellBlockText(sp),
        charges:null,src:"json"
      };
    });
  }
  return out;
}

function useItemCompendium(){
  const [tick,setTick]=React.useState(0);
  React.useEffect(function(){
    function onUpdate(){setTick(function(t){return t+1;});}
    _itemListeners.push(onUpdate);
    // Regenerate spell scrolls whenever the spell cache updates (markdown now, JSON later).
    function regenScrolls(){
      if(_spellCache.status==="ready"||_spellCache.data){
        _itemCache.scrolls=generateSpellScrolls(_spellCache.data);
        _notifyItemListeners();
      }
    }
    _spellListeners.push(regenScrolls);
    // Ensure spells load even if the user never opens the Compendium, so the
    // generated spell scrolls are available to inventory autofill. regenScrolls
    // (registered above) builds them once the spell cache finishes loading.
    ensureSpellCacheLoading();
    if(_itemCache.status==="idle"){
      _itemCache.status="loading";
      _itemCache.data={};
      var pending=2;
      function done(){pending--;if(pending<=0){_enrichMdItemsWithWeaponStats();_itemCache.status="ready";}_notifyItemListeners();}
      // ── Markdown source ──
      fetch(ITEM_MD_URL)
        .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.text();})
        .then(function(text){var md=parseItemMarkdown(text);Object.keys(md).forEach(function(k){if(!_itemCache.data[k])_itemCache.data[k]=md[k];});})
        .catch(function(){})
        .finally(function(){done();});
      // ── JSON sources: read the manifest, fetch every listed file, merge their
      //    arrays by key (so magicvariants can see baseitems from other files), parse once. ──
      fetch(ITEM_JSON_INDEX)
        .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
        .then(function(list){
          var files=Array.isArray(list)?list:(list&&list.files)||[];
          if(!files.length) return null;
          return Promise.all(files.map(function(fn){
            var url=/^https?:\/\//.test(fn)?fn:(ITEM_JSON_BASE+fn);
            return fetch(url).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
          })).then(function(datas){
            var merged={item:[],baseitem:[],magicvariant:[],itemGroup:[],itemEntry:[]};
            datas.forEach(function(d){
              if(!d) return;
              ["item","baseitem","magicvariant","itemGroup","itemEntry"].forEach(function(key){
                if(Array.isArray(d[key])) merged[key]=merged[key].concat(d[key]);
              });
              if(Array.isArray(d)) merged.item=merged.item.concat(d);
            });
            var js=parseItemJson(merged);
            Object.keys(js).forEach(function(k){if(!_itemCache.data[k])_itemCache.data[k]=js[k];});
          });
        })
        .catch(function(){})
        .finally(function(){done();});
    }
    // Generate scrolls now if spells already loaded; the listener handles later loads.
    regenScrolls();
    return function(){
      var i1=_itemListeners.indexOf(onUpdate);if(i1>=0)_itemListeners.splice(i1,1);
      var i2=_spellListeners.indexOf(regenScrolls);if(i2>=0)_spellListeners.splice(i2,1);
    };
  },[]);
  // Merge base item data with generated spell scrolls (scrolls don't override real items).
  if(_itemCache.scrolls){
    var combined=Object.assign({},_itemCache.scrolls,_itemCache.data);
    return {data:combined,status:_itemCache.status};
  }
  return _itemCache;
}

// Open5e live search across weapons, armor, magic items. Returns normalized items.
function open5eSearch(query){
  var q=encodeURIComponent(query);
  var endpoints=[
    {url:"https://api.open5e.com/v1/weapons/?search="+q+"&limit=12",kind:"weapon",ver:"v1"},
    {url:"https://api.open5e.com/v1/armor/?search="+q+"&limit=12",kind:"armor",ver:"v1"},
    {url:"https://api.open5e.com/v1/magicitems/?search="+q+"&limit=12",kind:"magic",ver:"v1"},
    {url:"https://api.open5e.com/v2/items/?name__icontains="+q+"&document__key=srd-2024&limit=12",kind:"item24",ver:"v2"},
    {url:"https://api.open5e.com/v2/magicitems/?name__icontains="+q+"&document__key=srd-2024&limit=12",kind:"magic24",ver:"v2"}
  ];
  return Promise.all(endpoints.map(function(ep){
    return fetch(ep.url).then(function(r){return r.ok?r.json():{results:[]};}).catch(function(){return {results:[]};})
      .then(function(json){
        return (json.results||[]).filter(function(it){return ep.ver==="v2"||isSrdDoc(it.document__slug);}).map(function(it){
          // ── v2 SRD-2024 items ──
          if(ep.ver==="v2"){
            var w2=(it.weight!==undefined&&it.weight!==null?(""+it.weight):"").replace(/\s*(lb\.?|lbs\.?|pounds?)\s*$/i,"").trim();
            var d2="";
            if(ep.kind==="magic24"){
              var raRaw=it.requires_attunement;
              var hasAttune=raRaw===true||raRaw==="true"||(typeof raRaw==="string"&&raRaw.trim()&&raRaw.toLowerCase()!=="false"&&raRaw.toLowerCase()!=="no");
              // attunement_detail holds the qualifier text like "by a spellcaster"; the boolean just means yes/no
              var detail=(it.attunement_detail||"").toString().replace(/^requires attunement/i,"").replace(/^(true|yes)$/i,"").trim();
              // If requires_attunement itself is descriptive text (not a bool), use it as the detail
              if(typeof raRaw==="string"&&raRaw.toLowerCase()!=="true"&&raRaw.toLowerCase()!=="false"&&raRaw.toLowerCase()!=="yes"&&raRaw.toLowerCase()!=="no"){
                var fromRa=raRaw.replace(/^requires attunement/i,"").trim();
                if(fromRa) detail=fromRa;
              }
              var att2=hasAttune?("*(Requires Attunement"+(detail?" "+detail:"")+")*"):"";
              var meta2=[it.type&&it.type.name?it.type.name:it.type,it.rarity&&it.rarity.name?it.rarity.name:it.rarity].filter(Boolean).join(", ");
              d2=[(meta2?"**Type:** "+meta2:""),att2,(it.desc||it.description||"").toString()].filter(Boolean).join("\n");
            } else {
              d2=(it.desc||it.description||"").toString();
            }
            var v2type=(it.type&&it.type.name?it.type.name:it.type)||"";
            var v2rarity=(it.rarity&&it.rarity.name?it.rarity.name:it.rarity)||"";
            return {name:it.name,weight:w2,cost:it.cost!==undefined?(""+it.cost):"",type:v2type,rarity:v2rarity,desc:d2,src:"open5e",kind:ep.kind==="magic24"?"magic":"item",srdVer:"24",attune:ep.kind==="magic24"?(function(){var r=it.requires_attunement;return r===true||r==="true"||(typeof r==="string"&&r.trim()&&r.toLowerCase()!=="false"&&r.toLowerCase()!=="no")?true:false;})():null};
          }
          // ── v1 (2014 SRD) items ──
          var weight=(it.weight||"").toString().replace(/\s*(lb\.?|lbs\.?|pounds?)\s*$/i,"").trim();
          var desc="";
          if(ep.kind==="weapon"){
            desc=[it.category,it.damage_dice?it.damage_dice+" "+(it.damage_type||""):"",it.properties&&it.properties.length?"Properties: "+it.properties.join(", "):""].filter(Boolean).join(". ");
          } else if(ep.kind==="armor"){
            desc=[it.category,it.ac_string?"AC: "+it.ac_string:"",it.strength_requirement?"Str req: "+it.strength_requirement:"",it.stealth_disadvantage?"Stealth disadvantage":""].filter(Boolean).join(". ");
          } else {
            var attune="";
            var ra=(it.requires_attunement||"").toString().trim();
            if(ra){attune="*(Requires Attunement"+(ra.replace(/^requires attunement/i,"").trim()?" "+ra.replace(/^requires attunement/i,"").trim():"")+")*";}
            var meta=[it.type,it.rarity].filter(Boolean).join(", ");
            desc=[(meta?"**Type:** "+meta:""),attune,(it.desc||"").toString()].filter(Boolean).join("\n");
          }
          return {name:it.name,weight:weight,cost:it.cost||"",type:it.type||(ep.kind==="weapon"?"Weapon":ep.kind==="armor"?"Armor":""),rarity:it.rarity||"",desc:desc,src:"open5e",kind:ep.kind,srdVer:"14",attune:ep.kind==="magic"?((it.requires_attunement||"").toString().trim()?true:false):null};
        });
      });
  })).then(function(arrs){
    var merged=[];arrs.forEach(function(a){merged=merged.concat(a);});
    // Dedup within each SRD version separately so both 14 and 24 versions can show
    var seen={};return merged.filter(function(it){var k=it.srdVer+":"+it.name.toLowerCase();if(seen[k])return false;seen[k]=true;return true;});
  });
}

function ItemNameInput({value, onChange, onAutofill, placeholder, style}){
  const local=useItemCompendium();
  const [open,setOpen]=React.useState(false);
  const [apiResults,setApiResults]=React.useState([]);
  const [apiLoading,setApiLoading]=React.useState(false);
  const [rect,setRect]=React.useState(null); // input bounding rect for fixed dropdown
  const pickingRef=React.useRef(false);
  const debounceRef=React.useRef(null);
  const inputRef=React.useRef(null);

  const updateRect=React.useCallback(function(){
    if(inputRef.current){
      var r=inputRef.current.getBoundingClientRect();
      setRect({left:r.left,top:r.bottom,width:r.width});
    }
  },[]);

  // Debounce the matching value so typing stays smooth against a large item set.
  const [dValue,setDValue]=React.useState(value||"");
  React.useEffect(function(){var t=setTimeout(function(){setDValue(value||"");},120);return function(){clearTimeout(t);};},[value]);

  // Local matches (items.md + items.json) take priority
  var localMatches=[];
  if(local.status==="ready"&&local.data&&(dValue||"").length>=2){
    var q=(dValue||"").toLowerCase();
    // Pin the exact-name item via a direct O(1) lookup so it's never lost to the
    // scan cap below (e.g. "shield" sits behind ~85 "...shield..." magic items).
    var exactHit=(local.data[q]&&!(local.data[q].generic||local.data[q].variantGeneric))?local.data[q]:null;
    var prefixM=[],subM=[];
    var keys=Object.keys(local.data);
    for(var ki=0;ki<keys.length;ki++){
      var k=keys[ki];var pos=k.indexOf(q);
      if(pos<0) continue;
      if(k===q) continue; // already captured as exactHit
      if(local.data[k]&&(local.data[k].generic||local.data[k].variantGeneric)) continue; // generic/variant parents never go in inventory
      if(pos===0) prefixM.push(local.data[k]);
      else subM.push(local.data[k]);
      if((exactHit?1:0)+prefixM.length+subM.length>=40) break; // cap scan
    }
    localMatches=(exactHit?[exactHit]:[]).concat(prefixM).concat(subM).slice(0,6);
  }

  // Debounced Open5e fallback
  React.useEffect(function(){
    if((value||"").length<2){setApiResults([]);return;}
    if(debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current=setTimeout(function(){
      setApiLoading(true);
      open5eSearch(value).then(function(res){
        setApiResults(res);setApiLoading(false);
      }).catch(function(){setApiResults([]);setApiLoading(false);});
    },350);
    return function(){if(debounceRef.current) clearTimeout(debounceRef.current);};
  },[value]);

  // Reposition the fixed dropdown on scroll/resize while open
  React.useEffect(function(){
    if(!open) return;
    updateRect();
    function onMove(){updateRect();}
    window.addEventListener("scroll",onMove,true);
    window.addEventListener("resize",onMove);
    return function(){window.removeEventListener("scroll",onMove,true);window.removeEventListener("resize",onMove);};
  },[open,updateRect]);

  // Merge: local first, then API items not already in local
  // Show both File and SRD results, even when names match — tags distinguish them
  var apiExtra=apiResults.slice(0,8);
  var suggestions=localMatches.concat(apiExtra);

  function applyItem(it){
    pickingRef.current=false;
    setOpen(false);
    onAutofill(it);
  }

  var showDrop=open&&((value||"").length>=2)&&(suggestions.length>0||apiLoading)&&rect;

  return (
    <div style={{position:"relative",display:"flex",alignItems:"center",width:"100%"}}>
      <input
        ref={inputRef}
        value={value||""}
        onChange={onChange}
        onFocus={function(){updateRect();setOpen(true);}}
        onBlur={function(){if(!pickingRef.current) setOpen(false);}}
        placeholder={placeholder}
        style={style}
      />
      {showDrop&&(
        <div
          onMouseDown={function(){pickingRef.current=true;}}
          onMouseUp={function(){pickingRef.current=false;}}
          style={{position:"fixed",top:rect.top,left:rect.left,zIndex:99999,background:"#1a1208",border:"1px solid rgba(201,150,42,.4)",boxShadow:"0 4px 24px rgba(0,0,0,.9)",minWidth:Math.max(rect.width,240),maxWidth:380,maxHeight:280,overflowY:"auto"}}
        >
          {suggestions.map(function(it,idx){
            return (
              <div key={it.name+idx}
                onClick={function(){applyItem(it);}}
                style={{padding:"6px 10px",cursor:"pointer",borderBottom:"1px solid rgba(201,150,42,.08)",display:"flex",alignItems:"baseline",gap:8}}
              >
                <span style={{fontFamily:"'EB Garamond',serif",fontSize:13,color:"var(--gold-l)",fontWeight:600,flex:1}}>{it.name}</span>
                {it.weight?<span style={{fontFamily:"'EB Garamond',serif",fontSize:10,color:"rgba(232,213,176,.4)",whiteSpace:"nowrap"}}>{it.weight} lb</span>:null}
                <span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:.5,color:(it.src==="local"||it.src==="json"||it.src==="file")?"rgba(74,156,92,.6)":"rgba(96,180,196,.55)",whiteSpace:"nowrap",textTransform:"uppercase"}}>{(it.src==="local"||it.src==="json"||it.src==="file")?"File":("SRD"+(it.srdVer||""))}</span>
              </div>
            );
          })}
          {apiLoading&&<div style={{padding:"6px 10px",fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase"}}>Searching SRD…</div>}
        </div>
      )}
    </div>
  );
}

// ─── Class-feature creature scaling helpers (Ranger Primal Companion, summons) ───
function _wordToNum(w){var W={one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10};return W[(""+w).toLowerCase().trim()]||parseInt(w)||0;}
function _crmkF(flat){return {flat:String(flat),charAbls:[],creatureAbls:[],profs:[],lvlEntries:[],spellLevelMult:0,useSpellAtk:null};}
// Mutate a creature formula in place, adding character-derived scaling found in `txt`:
//   "plus your Wisdom modifier" -> charAbls;  "+ PB" / "your Proficiency Bonus" -> profs(full);
//   "five times your Ranger level" -> that many stacked class-level entries.
function _applyCharScaling(formula, txt){
  if(!formula||!txt) return formula;
  var AB={strength:"STR",dexterity:"DEX",constitution:"CON",intelligence:"INT",wisdom:"WIS",charisma:"CHA"};
  var re=/(?:plus|\+)\s+your\s+(Strength|Dexterity|Constitution|Intelligence|Wisdom|Charisma)\s+modifier/gi,m;
  while((m=re.exec(txt))){formula.charAbls=(formula.charAbls||[]).concat(AB[m[1].toLowerCase()]);}
  if(/(?:plus|\+)\s+(?:your\s+)?(?:PB\b|proficiency bonus)/i.test(txt)){formula.profs=(formula.profs||[]).concat("full");}
  if(/your spellcasting ability modifier/i.test(txt)){formula.useSpellAbl=0;}
  var lm=txt.match(/(\d+|one|two|three|four|five|six|seven|eight|nine|ten)\s+times\s+your\s+([A-Za-z][A-Za-z ]*?)\s+level/i);
  if(lm){var n=_wordToNum(lm[1]),cls=lm[2].trim();for(var i=0;i<n;i++)formula.lvlEntries=(formula.lvlEntries||[]).concat({type:"class-full",cls:cls});}
  return formula;
}
// Parse an HP string into {hpMax,hpFormula,spellLevel?,hdType?,hdFormula?}, handling
// summon scaling, class-level scaling and ability/PB scaling.
function _parseHpString(hp){
  var out={};
  var sm=hp.match(/(-?\d+)\s*\+\s*(\d+)\s*(?:for each|per)\s+spell level above\s+(\d+)/i);
  if(sm){var A=+sm[1],B=+sm[2],N=+sm[3];var f=_crmkF(A-B*N);f.spellLevelMult=B;out.hpFormula=f;out.hpMax=String(A);out.spellLevel=N;}
  else{
    var hn=hp.match(/-?\d+/);if(hn){out.hpMax=hn[0];out.hpFormula=_crmkF(parseInt(hn[0]));}
    var hd=hp.match(/(\d+)d(\d+)/);if(hd){var sd="d"+hd[2];if(["d4","d6","d8","d10","d12","d20"].indexOf(sd)>=0){out.hdType=sd;out.hdFormula=_crmkF(parseInt(hd[1]));}}
  }
  if(out.hpFormula)_applyCharScaling(out.hpFormula,hp);
  var hdm=hp.match(/Hit Dice\s*\[?(d\d+)s?\]?\s*equal to your\s+([A-Za-z][A-Za-z ]*?)\s+level/i);
  if(hdm){out.hdType=hdm[1].toLowerCase();var hf=_crmkF(0);hf.lvlEntries=[{type:"class-full",cls:hdm[2].trim()}];out.hdFormula=hf;}
  return out;
}
// Detect a "Primal Bond"-style clause: character PB applies to all the creature's checks/saves.
function _isPrimalBond(txt){return /proficiency bonus to (any|all|each|every)[\s\S]{0,60}(saving throw|ability check|\bcheck|\bsave)/i.test(txt||"");}
// Detect conditional HP like "20 (Air only) or 30 (Land and Water only) + <suffix>".
// Returns [{label,hp}] (one combined HP string per variant) or null.
// Shared detector for "N (label)" options: handles "10 (Medium or smaller), 20
// (Large), 40 (Huge)" (comma list, no "only") and "11 (beast1) or 13 (beast2)"
// alike. Requires 2+ numbered parentheticals separated by list separators
// (comma / or / and / slash), with non-dice labels. Returns [{base,label,suffix}].
function _numberedVariants(txt){
  txt=""+(txt||"");
  var re=/(\d+)\s*\(([^)]+?)\)/g,m,parts=[];
  while((m=re.exec(txt))){
    var lab=m[2].trim().replace(/\s+only$/i,"");
    if(/d\d/i.test(lab)||/^\d+$/.test(lab)||/^\d+\s*[+\-]/.test(lab)) continue; // skip dice/number parentheticals
    parts.push({base:m[1],label:lab,start:m.index,end:re.lastIndex});
  }
  if(parts.length<2) return null;
  for(var i=1;i<parts.length;i++){
    if(!/^[\s,;/]*(?:or|and)?[\s,;/]*$/i.test(txt.slice(parts[i-1].end,parts[i].start))) return null;
  }
  var suffix=txt.slice(parts[parts.length-1].end).replace(/^\s*(?:or|and|,|;|\/)?\s*/i,"");

  (arr||[]).forEach(function(m){if(m&&m.name)byKey[((m.name)+"|"+(m.source||"")).toLowerCase()]=m;});
  return (arr||[]).map(function(m){try{return resolveMonsterCopy(m,byKey,0);}catch(e){return m;}});
}
// Token image URL (bestiary/tokens/<source>/<name>.webp), honouring token/tokenUrl overrides.
function _tokenUrl(m){
  if(!m) return null;
  if(m.tokenUrl) return m.tokenUrl;
  var tn=m.name, ts=m.source;
  if(m.token&&m.token.name){tn=m.token.name; ts=m.token.source||ts;}
  if((m.hasToken||m.token)&&tn&&ts)
    return "https://raw.githubusercontent.com/5etools-mirror-3/5etools-img/main/bestiary/tokens/"+encodeURIComponent(ts)+"/"+encodeURIComponent(tn)+".webp";
  return null;
}
// ── Size/option-dependent attacks ────────────────────────────────────────────
// A damage line like "1d4 + 3, 2d6 + 3 … (Large), or 2d12 + 3 … (Huge)" lists one
// attack with different damage per size. Surface these as separate labeled attacks
// (Slam (Medium or smaller) / (Large) / (Huge)) rather than one attack.
function _scaleSegFormula(out,txt){

function _parseDamageSeg(seg,spellLevel){
  var out={dmgDice:"",dmgFormula:null,dmgType:""};
  var dyn=seg.match(/\(\s*summonSpellLevel\s*([+\-]\s*\d+)?\s*\)d(\d+)/i);
  if(dyn){
    var adj=dyn[1]?parseInt(dyn[1].replace(/\s+/g,"")):0;
    var cnt=Math.max(1,(parseInt(spellLevel)||0)+adj);
    out.dmgDice=cnt+"d"+dyn[2];
    var after=seg.slice(seg.indexOf(dyn[0])+dyn[0].length);
    var fb=after.match(/^\s*([+-]\s*\d+)/); if(fb)out.dmgFormula=_crmkF(parseInt(fb[1].replace(/\s+/g,"")));

    if(dmg){
      out.dmgDice=dmg[1]+"d"+dmg[2];
      var _bn=dmg[3]?parseInt(dmg[3].replace(/\s+/g,"")):0; if(_bn!==0)out.dmgFormula=_crmkF(_bn);

      _scaleSegFormula(out,after2);

}
function _damageAlternatives(txt){
  txt=""+(txt||"");
  var diceRe=/(?:\(\s*summonSpellLevel[^)]*\)|\d+)d\d+/gi,m,pos=[];
  while((m=diceRe.exec(txt))){pos.push(m.index);}
  if(pos.length<2) return null;
  var alts=[];
  for(var i=0;i<pos.length;i++){
    var seg=txt.slice(pos[i],(i+1<pos.length)?pos[i+1]:txt.length);
    var label="",pre=/\(([^)]+?)\)/g,pm;
    while((pm=pre.exec(seg))){ if(!/summonspelllevel|spell\s*level/i.test(pm[1])){label=pm[1].trim().replace(/\s+only$/i,"");break;} }
    alts.push({label:label,seg:seg});
  }
  return alts;
}
function _expandSizedAttacks(cr){
  if(!cr) return;
  var labelSet=(cr._hpVariants||cr._variants||[]).map(function(v){return v.label;});
  ["actions","bonusActions","reactions"].forEach(function(key){
    var arr=cr[key]; if(!Array.isArray(arr)) return;
    var out=[];
    arr.forEach(function(atk){
      var alts=_damageAlternatives(atk.description||"");
      if(!alts||alts.length<2||!alts.some(function(a){return a.label;})){out.push(atk);return;}
      var used=alts.map(function(a){return a.label.toLowerCase();}).filter(Boolean);
      var remaining=labelSet.filter(function(l){return used.indexOf(l.toLowerCase())<0;});
      alts.forEach(function(a){
        var label=a.label||(remaining.length===1?remaining[0]:"");
        var seg=_parseDamageSeg(a.seg,cr.spellLevel);
        var na=Object.assign({},atk);
        na.nm=atk.nm+(label?" ("+label+")":"");
        na.dmgDice=seg.dmgDice; na.dmgFormula=seg.dmgFormula; if(seg.dmgType)na.dmgType=seg.dmgType;
        out.push(na);

    });

// Point every spell-derived formula on a creature at the chosen spell-class index.
function _applySummonClass(cr,idx){
  if(!cr) return cr;
  function fix(f){if(f){if(f.useSpellAtk!=null)f.useSpellAtk=idx;if(f.useSpellAbl!=null)f.useSpellAbl=idx;}}

  fix(cr.acFormula);fix(cr.hpFormula);fix(cr.pbFormula);fix(cr.iniFormula);fix(cr.hdFormula);
  (cr.dcs||[]).forEach(function(d){fix(d.customFormula);});

  return cr;
}
// Does this creature reference the character's spellcasting (so the class matters)?
function _usesSpellcasting(cr){
  if(!cr) return false;
  var hit=false;
  function chk(f){if(f&&(f.useSpellAtk!=null||f.useSpellAbl!=null))hit=true;}
  ["actions","bonusActions","reactions"].forEach(function(k){(cr[k]||[]).forEach(function(a){chk(a.atkFormula);chk(a.dmgFormula);});});
  chk(cr.acFormula);chk(cr.hpFormula);chk(cr.pbFormula);(cr.dcs||[]).forEach(function(d){chk(d.customFormula);});

}
function convertMonsterJson(arr,fluffIdx,fluffByName){
  fluffIdx=fluffIdx||{}; fluffByName=fluffByName||{};
  arr=resolveMonsterCopies(arr||[]);
  var out={};
  (arr||[]).forEach(function(m){
    if(!m||!m.name) return;
    if(m.reprintedAs) return; // superseded printing — ignore (reprinted elsewhere)
    try{
      var md=cmpMonsterJsonToMarkdown(m);
      var creature=cmpParseStatblock(md,"Companion");
      creature.nm=m.name;
      if(m.summonedBySpellLevel) creature.spellLevel=m.summonedBySpellLevel; // summon base level
      if(out[m.name]) return;
      // Fluff: prefer inline m.fluff (some files embed it), else the separate
      // monsterFluff index (match by name+source, fall back to name); resolve _copy.
      var fkey=((m.name||"")+"|"+(m.source||"")).toLowerCase();
      var inline=(m.fluff&&(m.fluff.entries||m.fluff.images||m.fluff._copy))?m.fluff:null;
      var fl=inline||fluffIdx[fkey]||fluffByName[(m.name||"").toLowerCase()];
      if(fl) fl=resolveFluffCopy(fl,fluffIdx,0);
      var lore=cmpFluffToMd(fl);
      // Each displayed image is a fallback chain (array of candidate URLs).
      var images=cmpFluffImages(fl).map(function(u){return [u];});
      if(!images.length){
        var cands=[];
        if(m.hasFluffImages&&m.name&&m.source){
          var enc=encodeURIComponent(m.name);
          cands.push("https://raw.githubusercontent.com/5etools-mirror-3/5etools-img/main/bestiary/"+encodeURIComponent(m.source)+"/"+enc+".webp");
          if(m.source!=="MM") cands.push("https://raw.githubusercontent.com/5etools-mirror-3/5etools-img/main/bestiary/MM/"+enc+".webp"); // 2014 art fallback
        }
        // Only when there is no full artwork: fall back to the creature's token, if any.
        var _tok=_tokenUrl(m); if(_tok) cands.push(_tok);
        if(cands.length) images=[cands];
      }
      var desc=cmpMonsterJsonToDisplayMd(m)+(lore?"\n\n___\n\n"+lore:"");
      out[m.name]={name:m.name,src:"file",source:m.source||"",desc:desc,creature:creature,cr:cmpCrStr(m.cr),size:cmpSizeName(m.size),ctype:cmpTypeName(m),environment:(Array.isArray(m.environment)?m.environment.join(", "):(m.environment||"")),images:images,_kind:"creature"};

}
// Custom folder loader for creatures: reads `monster` arrays AND `monsterFluff`
// arrays (lore) from every JSON file in the folder — so fluff may live in a
// separate file (e.g. fluff-bestiary-*.json), as long as it's listed in index.json.
function loadCreatureFolder(onDone){
  var base=REPO_RAW_BASE+"creatures/";
  fetch(base+"index.json")
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(function(list){
      var files=Array.isArray(list)?list:((list&&list.files)||[]);
      if(!files.length) return null;
      return Promise.all(files.map(function(fn){
        var url=/^https?:\/\//.test(fn)?fn:(base+fn);
        return fetch(url).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
      })).then(function(datas){
        var monsters=[],fluffIdx={},fluffByName={};
        datas.forEach(function(d){
          if(!d) return;
          if(Array.isArray(d.monster)) monsters=monsters.concat(d.monster);
          else if(Array.isArray(d)) monsters=monsters.concat(d);
          if(Array.isArray(d.monsterFluff)) d.monsterFluff.forEach(function(f){
            if(!f||!f.name) return;
            var key=(f.name+"|"+(f.source||"")).toLowerCase();
            if(!fluffIdx[key]) fluffIdx[key]=f;
            var nk=f.name.toLowerCase();
            if(!fluffByName[nk]) fluffByName[nk]=f;
          });
        });
        var conv=convertMonsterJson(monsters,fluffIdx,fluffByName);
        Object.keys(conv).forEach(function(k){if(!_creatureCache.data[k])_creatureCache.data[k]=conv[k];});
      });
    })
    .catch(function(){})
    .finally(function(){if(onDone)onDone();});
}
// Parse a creatures.md file (multiple GMBinder statblocks) into compendium entries.
function parseCreaturesMd(text){
  var out={};
  if(!text) return out;
  var lines=text.replace(/\r\n?/g,"\n").split("\n");
  var heads=[];
  for(var i=0;i<lines.length;i++){if(/^\s*>?\s*#{1,2}\s+\S/.test(lines[i]))heads.push(i);}
  heads.push(lines.length);
  for(var h=0;h<heads.length-1;h++){
    var block=lines.slice(heads[h],heads[h+1]).join("\n");
    if(!/\*\*\s*Armor Class\s*\*\*/i.test(block)&&!/\|\s*>?\s*STR\b/i.test(block)) continue; // not a statblock
    var nm=(lines[heads[h]].match(/#{1,2}\s+(.+?)\s*#*\s*$/)||[])[1];
    if(!nm) continue; nm=nm.replace(/^\s*>?\s*/,"").trim();
    try{
      var creature=cmpParseStatblock(block,"Companion");creature.nm=nm;
      var disp=block.replace(/^[ \t]*>+[ \t]?/gm,"").replace(/^\s*#{1,2}\s+.+\n/,"")
        .replace(/(\*\*[^*\n]+\*\*)\s*::\s*/g,"$1 ")  // GMBinder label separator
        .replace(/\{\{\s*bonus\s+/gi,"").replace(/\{\{/g,"").replace(/\}\}/g,""); // GMBinder inline blocks
      if(!out[nm]) out[nm]={name:nm,src:"file",desc:disp,creature:creature,cr:"",size:creature.size,ctype:creature.subtype,_kind:"creature"};
    }catch(e){}
  }
  return out;
}
// Parse pasted markdown (one or many GMBinder statblocks) into compendium-style
// entries — the exact same pipeline as creatures.md, but fully offline. Falls
// back to treating the whole text as a single statblock when there's no leading
// "# Heading" (e.g. a name written with ### or no heading at all).
function parseCreaturesFromText(text){
  var out=[];
  if(!text||!text.trim()) return out;
  var md=parseCreaturesMd(text);
  var keys=Object.keys(md);
  if(keys.length){ keys.forEach(function(k){out.push(md[k]);}); return out; }
  if(/\*\*\s*Armor Class\s*\*\*/i.test(text)||/\|\s*>?\s*STR\b/i.test(text)){
    try{
      var creature=cmpParseStatblock(text,"Companion");
      var nm=(creature.nm&&creature.nm.trim())||"Creature";
      if(/^(Actions|Reactions|Bonus Actions|Legendary Actions|Mythic Actions|Lair Actions)$/i.test(nm))nm="Creature";
      creature.nm=nm;
      var disp=text.replace(/^[ \t]*>+[ \t]?/gm,"")
        .replace(/^\s*#{1,6}\s+.+\n/,"")
        .replace(/(\*\*[^*\n]+\*\*)\s*::\s*/g,"$1 ")
        .replace(/\{\{\s*bonus\s+/gi,"").replace(/\{\{/g,"").replace(/\}\}/g,"");
      out.push({name:nm,src:"file",desc:disp,creature:creature,cr:"",size:creature.size,ctype:creature.subtype,_kind:"creature"});
    }catch(e){}
  }
  return out;
}
function ensureCreatureCacheLoading(){

  _creatureCache.status="loading";_creatureCache.data={};
  var pending=2;
  function done(){pending--;if(pending<=0)_creatureCache.status="ready";_notifyCreatureListeners();}
  fetch(CREATURE_MD_URL)
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.text();})
    .then(function(text){var md=parseCreaturesMd(text);Object.keys(md).forEach(function(k){if(!_creatureCache.data[k])_creatureCache.data[k]=md[k];});})
    .catch(function(){})

  loadCreatureFolder(done);

function useCreatureCompendium(active){
