// ── Markdown rendering (dependency-free) ───────────────────────────────────────
// Supports headings, **bold** / *italic* / ***both***, `code`, [links](url),
// horizontal rules, ordered/unordered lists, blockquotes, fenced code, and GFM
// pipe tables. Used to render entry descriptions and any user-written text.
function _mdSplitRow(line){var s=line.trim().replace(/^\|/,"").replace(/\|$/,"");return s.split("|").map(function(c){return c.trim();});}

  function flushPara(buf){ if(buf.length) blocks.push({type:"p",text:buf.join("\n")}); }
  while(i<lines.length){
    var line=lines[i], trimmed=line.trim();
    if(!trimmed){i++;continue;}
    if(/^```/.test(trimmed)){var fence=[];i++;while(i<lines.length&&!/^```/.test(lines[i].trim())){fence.push(lines[i]);i++;}i++;blocks.push({type:"code",text:fence.join("\n")});continue;}

    if(h){blocks.push({type:"heading",level:h[1].length,text:h[2].replace(/\s+#+\s*$/,"").trim()});i++;continue;}
    if(/^(\*\s*){3,}$/.test(trimmed)||/^(-\s*){3,}$/.test(trimmed)||/^(_\s*){3,}$/.test(trimmed)){blocks.push({type:"hr"});i++;continue;}
    if(trimmed.indexOf("|")>=0&&i+1<lines.length&&_mdIsTableSep(lines[i+1])){

      var aligns=_mdSplitRow(lines[i+1]).map(function(c){var l=c.charAt(0)===":",r=c.charAt(c.length-1)===":";return l&&r?"center":r?"right":l?"left":"";});

      while(i<lines.length&&lines[i].trim().indexOf("|")>=0&&lines[i].trim()){rows.push(_mdSplitRow(lines[i]));i++;}

    }

      if(/^(\*\s*){3,}$/.test(t2)||/^(-\s*){3,}$/.test(t2)||/^(_\s*){3,}$/.test(t2)) break;

function _mdInline(text){
  var out=[]; var rest=text==null?"":(""+text);
  var patterns=[
    {re:/`([^`]+)`/,t:"code"},
    {re:/\*\*\*([^*]+?)\*\*\*/,t:"bi"},
    {re:/\*\*([^*]+?)\*\*/,t:"b"},
    {re:/(^|[^*])\*([^*\s][^*]*?)\*/,t:"ig"},
    {re:/\b_([^_]+?)_\b/,t:"i"},
    {re:/\[([^\]]+)\]\(([^)\s]+)\)/,t:"a"}
  ];
  var guard=0;
  while(rest&&guard++<5000){
    var best=null,bestIdx=Infinity,bestPat=null;
    for(var p=0;p<patterns.length;p++){
      var m=patterns[p].re.exec(rest);
      if(m){var idx=m.index+(patterns[p].t==="ig"?(m[1]?m[1].length:0):0);if(idx<bestIdx){bestIdx=idx;best=m;bestPat=patterns[p];}}
    }
    if(!best){out.push({t:"text",v:rest});break;}
    if(bestIdx>0) out.push({t:"text",v:rest.slice(0,bestIdx)});
    if(bestPat.t==="code") out.push({t:"code",v:best[1]});
    else if(bestPat.t==="bi") out.push({t:"bi",children:_mdInline(best[1])});
    else if(bestPat.t==="b") out.push({t:"b",children:_mdInline(best[1])});
    else if(bestPat.t==="ig") out.push({t:"i",children:_mdInline(best[2])});
    else if(bestPat.t==="i") out.push({t:"i",children:_mdInline(best[1])});
    else if(bestPat.t==="a") out.push({t:"a",v:best[1],href:best[2]});
    var consumedLen=(bestPat.t==="ig")?(best[0].length-(best[1]?best[1].length:0)):best[0].length;
    rest=rest.slice(bestIdx+consumedLen);

}
function _mdRenderInline(tokens,kp){

function matchQuery(text, query){
  text=(""+(text||"")).toLowerCase();
  query=(""+(query||"")).trim();
  if(!query) return true;
  // Pull out every !term (a term runs until the next + | ! or end) as a global exclusion.
  var excludes=[];
  var positive=query.replace(/!([^+|!]*)/g,function(_,t){var s=t.trim().toLowerCase();if(s)excludes.push(s);return "";});
  for(var i=0;i<excludes.length;i++){ if(text.indexOf(excludes[i])>=0) return false; }
  positive=positive.toLowerCase();
  var orGroups=positive.split("|").map(function(g){return g.trim();}).filter(function(g){return g.length>0;});
  if(!orGroups.length) return true; // only exclusions were supplied → already passed them
  for(var g=0;g<orGroups.length;g++){
    var ands=orGroups[g].split("+").map(function(a){return a.trim();}).filter(Boolean);
    if(!ands.length) continue;
    var all=true;
    for(var a=0;a<ands.length;a++){ if(text.indexOf(ands[a])<0){all=false;break;} }
    if(all) return true;
  }
  return false;
}

// Load every JSON file listed in <folder>/index.json, read one array key from each
// (e.g. "spell"), run them through `convert`, and merge into `target` WITHOUT
// overwriting existing keys (so markdown, loaded first, wins name conflicts).
// `convert` takes the combined array and returns a {key: record} object.
// Calls `onDone` exactly once when finished (success or failure).
function loadCompendiumJsonFolder(folder,arrayKey,convert,target,onDone){
  var base=REPO_RAW_BASE+folder+"/";
  fetch(base+"index.json")
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(function(list){
      var files=Array.isArray(list)?list:(list&&list.files)||[];
      if(!files.length) return null;
      return Promise.all(files.map(function(fn){
        var url=/^https?:\/\//.test(fn)?fn:(base+fn);
        return fetch(url).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
      })).then(function(datas){
        var combined=[];
        datas.forEach(function(d){
          if(!d) return;
          if(Array.isArray(d[arrayKey])) combined=combined.concat(d[arrayKey]);
          else if(Array.isArray(d)) combined=combined.concat(d); // bare array file
        });
        var conv=convert(combined)||{};
        Object.keys(conv).forEach(function(k){if(!target[k])target[k]=conv[k];});
      });
    })
    .catch(function(){})
    .finally(function(){if(onDone)onDone();});
}

// Homebrewery preprocessing for spell markdown. ONLY {{note}} and {{monster}} blocks
// are kept (wrappers stripped, contents preserved); every OTHER {{…}} block (pageNumber,
// descriptive, quote, wide, etc.) is discarded entirely — contents and all. Headings inside
// a kept block are placeholder-protected so the #### splitter / desc-break won't cut there
// (restored later), and "**Label** :: value" stat syntax becomes "**Label:** value".
function _prepHomebrew(md){
  var lines=(md||"").replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
  var out=[]; var stack=[]; // stack of booleans: is this open block a "drop" block?
  function dropping(){for(var k=0;k<stack.length;k++) if(stack[k]) return true; return false;}
  for(var i=0;i<lines.length;i++){
    var raw=lines[i];
    var startInBlock=stack.length>0;
    var kept=""; var j=0;
    while(j<raw.length){
      if(raw.charAt(j)==="{"&&raw.charAt(j+1)==="{"){
        var mOpen=raw.slice(j).match(/^\{\{\s*([A-Za-z][\w-]*)?(?:\s*,\s*[A-Za-z][\w-]*)*\s*,?\s*/);
        var nm=(mOpen&&mOpen[1]?mOpen[1]:"").toLowerCase();
        var keepBlock=(nm==="note"||nm==="monster");
        stack.push(dropping()?true:!keepBlock); // once inside a drop block, stay dropping
        j+=(mOpen?mOpen[0].length:2);
        continue;
      }
      if(raw.charAt(j)==="}"&&raw.charAt(j+1)==="}"){
        if(stack.length) stack.pop();
        j+=2; continue;
      }
      if(!dropping()) kept+=raw.charAt(j);
      j++;
    }
    var inBlock=startInBlock||stack.length>0;
    if(kept.trim()===""){
      // Preserve only genuine blank lines that sit outside any block.
      if(raw.trim()===""&&!dropping()&&!inBlock) out.push("");
      continue;
    }
    if(inBlock){
      kept=kept.replace(/^(\s*)(#{4,6})\s+/,function(_m,sp,h){return sp+"@@MDH"+h.length+"@@ ";});
      kept=kept.replace(/\*\*\s*::\s*/g,":** ").replace(/\s*::\s*/g,": ");
    }
    out.push(kept);
  }
  return out.join("\n");
}
function _restoreHeadings(s){
  return (s||"").replace(/@@MDH([456])@@ /g,function(_m,n){return new Array(+n+1).join("#")+" ";});
}

function parseSpellMarkdown(md){
  var spells={};
  // Strip homebrewery wrappers (keeps embedded stat blocks), then split on #### headings.
  var blocks=_prepHomebrew(md).split(/^####\s+/m).slice(1);
  blocks.forEach(function(block){
    var lines=block.split("\n");
    var name=(lines[0]||"").trim();
    if(!name) return;
    // Parse italic line: *3rd-level Abjuration* or *Evocation Cantrip*
    // Also handle ritual tag: *1st-level Divination (ritual)*
    var level=0, school="", ritual=false;
    var italicLine=(lines[1]||"").trim().replace(/^\*|\*$/g,"");
    // Extract (ritual) from anywhere in the italic line
    if(/\(ritual\)/i.test(italicLine)){ritual=true;italicLine=italicLine.replace(/\s*\(ritual\)/i,"").trim();}
    var cantrip=italicLine.match(/^(\w+)\s+Cantrip$/i);
    var leveled=italicLine.match(/^(\d+)(?:st|nd|rd|th)[- ]level\s+(.+)$/i);
    if(cantrip){school=cantrip[1];level=0;}
    else if(leveled){level=parseInt(leveled[1]);school=leveled[2].trim();}
    // Parse key: value fields — handle both **Key:** Value and plain Key Value
    var castingTime="",range="",components="",duration="",conc=false,classes="";
    var descLines=[];
    var pastDuration=false;
    for(var li=2;li<lines.length;li++){
      var ln=lines[li].trim();
      // Stop at any heading (## / ### section dividers between spell groups)
      if(/^#/.test(ln)) break;
      if(!pastDuration){
        // Match **Key:** Value OR plain Key Value (for keys we know)
        var kv=ln.match(/^\*\*([^*]+)\*\*[:\s]+(.+)$/)||ln.match(/^(Casting Time|Range|Components|Duration|Classes)[:\s]+(.+)$/i);
        if(kv){
          var k=kv[1].toLowerCase().trim().replace(/:$/,""), v=kv[2].trim();
          if(k==="casting time"){
            if(/ritual/i.test(v)){ritual=true;v=v.replace(/\s*or\s+ritual|\s*\(?ritual\)?/gi,"").trim();}
            castingTime=v;
          }
          else if(k==="range"){range=v;}
          else if(k==="components"){components=v;}
          else if(k==="classes"){classes=v;}
          else if(k==="duration"){
            if(/concentration/i.test(v)){conc=true;v=v.replace(/concentration,?\s*(up\s+to\s+)?/i,"").trim();}
            duration=v;
            pastDuration=true;
          }
          continue;
        }
        // Only flip to description mode on unrecognised lines if we've seen all 4 fields
        if(ln&&castingTime&&range&&components&&duration&&!pastDuration){pastDuration=true;}
      }
      if(pastDuration){
        // Keep markdown intact in the description; only strip for the artifact/heading checks.
        var plain=ln.replace(/[*`_]/g,"");
        if(ln&&!/^\\?(column|page)$/i.test(plain)&&!/^\{\{/.test(ln)){
          // Normalize "At Higher Levels" / "Cantrip Scaling/Upgrade" to a ***run-in*** subheader,
          // regardless of how (or whether) the markdown emphasized it.
          var hm=ln.match(/^[\*_]*\s*(at higher levels|cantrip scaling|cantrip upgrade|cantrip update)\b[\s.*_]*/i);
          if(hm){
            if(descLines.length>0) descLines.push("");
            var hrest=ln.slice(hm[0].length).trim();
            var htitle=hm[1].toLowerCase().replace(/\b\w/g,function(c){return c.toUpperCase();});
            descLines.push("***"+htitle+".***"+(hrest?" "+hrest:""));
          } else {
            descLines.push(ln);
          }
        }
      }
    }
    var desc=_restoreHeadings(descLines.join("\n").trim());
    // Skip stub entries that are just a name with no real content
    if(!desc&&!castingTime&&!range&&!components&&!duration&&!school&&!classes) return;
    spells[name.toLowerCase()]={name,level,school,castingTime,range,components,duration,conc,ritual,classes,desc};
  });
  return spells;
}

    if(dtype==="feet") return amt+" feet";

    return (amt!=null?amt+" ":"")+(dtype||"");
  }
  var rt=range.type;
  if(rt==="point") return dist();
  if(rt==="self") return "Self";
  if(rt==="touch") return "Touch";
  if(rt==="special") return "Special";
  // Shaped areas: cone/radius/line/sphere/cube/hemisphere — "Self (30-foot cone)" etc.
  if(rt&&dtype==="feet"&&amt!=null) return "Self ("+amt+"-foot "+rt+")";

}
// "V, S, M (a bit of fur)" from components:{v,s,m}.
function _fmtSpellComponents(comp){
  if(!comp||typeof comp!=="object") return strip5eTags(comp||"");
  var parts=[];
  if(comp.v) parts.push("V");
  if(comp.s) parts.push("S");
  if(comp.m){
    if(comp.m===true) parts.push("M");
    else if(typeof comp.m==="string") parts.push("M ("+strip5eTags(comp.m)+")");
    else if(comp.m.text) parts.push("M ("+strip5eTags(comp.m.text)+")");
    else parts.push("M");
  }
  if(comp.r) parts.push("R");
  return parts.join(", ");
}
// Returns {text, conc}. "Instantaneous", "1 minute", "Up to 1 hour", "Until dispelled".
function _fmtSpellDuration(dur){
  if(!Array.isArray(dur)||!dur.length) return {text:"",conc:false};
  var conc=false;
  var text=dur.map(function(d){
    if(d.concentration) conc=true;
    if(d.type==="instant") return "Instantaneous";
    if(d.type==="permanent"){
      var ends=(d.ends||[]).map(function(e){return e==="dispel"?"dispelled":e==="trigger"?"triggered":e;});
      return ends.length?"Until "+ends.join(" or "):"Permanent";
    }
    if(d.type==="special") return "Special";
    if(d.type==="timed"&&d.duration){
      var u=d.duration;
      var amt=u.amount!=null?u.amount:1;
      var unit=u.type||"round";
      return (d.concentration?"":"")+amt+" "+unit+(amt===1?"":"s");
    }
    return d.type||"";
  }).join(", ");

}
// Unique class names from classes.fromClassList (+ subclass/variant lists if present).
function _fmtSpellClasses(classes){
  if(!classes||typeof classes!=="object") return "";
  var names=[];
  (classes.fromClassList||[]).forEach(function(c){if(c&&c.name)names.push(c.name);});
  (classes.fromClassListVariant||[]).forEach(function(c){if(c&&c.name)names.push(c.name);});

  var seen={},out=[];
  names.forEach(function(n){var k=n.toLowerCase();if(!seen[k]){seen[k]=1;out.push(n);}});
  return out.join(", ");
}
function convertSpellJson(arr){
  var out={};
  (arr||[]).forEach(function(sp){
    if(!sp||!sp.name) return;
    var level=sp.level||0;
    var school=_SPELL_SCHOOL[(sp.school||"").toUpperCase()]||(sp.school||"");
    var ritual=!!(sp.meta&&sp.meta.ritual);
    var castingTime=_fmtSpellTime(sp.time);
    var range=_fmtSpellRange(sp.range);
    var components=_fmtSpellComponents(sp.components);
    var dd=_fmtSpellDuration(sp.duration);
    var classes=_fmtSpellClasses(sp.classes);
    // Description: entries, then higher-level/cantrip-scaling appended with a blank line.
    var descArr=flatten5eEntries(sp.entries,[]);
    if(sp.entriesHigherLevel&&sp.entriesHigherLevel.length){

// Kick off the spell-compendium fetch if it hasn't started yet. Idempotent and safe to
// call from anywhere — the item compendium calls it too, so spell scrolls can be generated
// even when the user opens Inventory without first visiting the Compendium.
function ensureSpellCacheLoading(){
  if(_spellCache.status!=="idle") return;
  _spellCache.status="loading";
  _spellCache.data={};
  var pending=2;
  function done(){pending--;if(pending<=0)_spellCache.status="ready";_notifySpellListeners();}
  // Load markdown (authoritative) and the spells/ JSON folder in parallel;
  // markdown is written first so it wins name conflicts.
  fetch(SPELL_MD_URL)
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.text();})
    .then(function(text){var md=parseSpellMarkdown(text);Object.keys(md).forEach(function(k){if(!_spellCache.data[k])_spellCache.data[k]=md[k];});})
    .catch(function(){})

}

function useSpellCompendium(){

// Returns true if a result's document slug/key indicates official SRD content (2014 or 2024).
// Lenient: accepts known SRD slugs AND anything that isn't a recognised third-party publisher,
// because Open5e's various endpoints tag SRD content with inconsistent slugs (srd / wotc-srd / srd-2014 / srd-2024).
function isSrdDoc(slug){
  slug=(""+(slug||"")).toLowerCase();
  if(!slug) return true; // no slug → assume SRD rather than silently dropping
  // Explicit third-party publishers to exclude
  var thirdParty=["tob","toh","kp","vom","cc","menagerie","a5e","bfrd","dmag","warlock","blackflag","kp-","deepm","tob2","tob3","tob-"];
  for(var i=0;i<thirdParty.length;i++){
    if(slug.indexOf(thirdParty[i])>=0) return false;
  }
  return true;
}

// Open5e SRD spell search — pulls from both v1 (2014 SRD) and v2 (2024 SRD), merged & deduped.
function open5eSpellSearch(query){

  var v1=fetch("https://api.open5e.com/v1/spells/?search="+q+"&limit=15").then(function(r){return r.ok?r.json():{results:[]};}).catch(function(){return {results:[]};})
    .then(function(json){
      return (json.results||[]).filter(function(sp){return isSrdDoc(sp.document__slug);}).map(function(sp){
        var lvl=parseInt(sp.level_int!==undefined?sp.level_int:sp.level)||0;
        var desc=(sp.desc||"").toString();
        if(sp.higher_level) desc+="\n\n***At Higher Levels.*** "+sp.higher_level;
        return {name:sp.name,level:lvl,school:sp.school||"",castingTime:sp.casting_time||"",range:sp.range||"",components:sp.components||"",duration:sp.duration||"",conc:!!sp.concentration&&sp.concentration!=="no",ritual:!!sp.ritual&&sp.ritual!=="no",classes:sp.dnd_class||sp.class||"",desc:desc,src:"srd",srdVer:"14"};
      });
    });
  var v2=fetch("https://api.open5e.com/v2/spells/?name__icontains="+q+"&document__key=srd-2024&limit=15").then(function(r){return r.ok?r.json():{results:[]};}).catch(function(){return {results:[]};})
    .then(function(json){
      // Fallback: if the document__key filter yields nothing, try just name filter + client-side SRD filter
      if(!json.results||json.results.length===0){
        return fetch("https://api.open5e.com/v2/spells/?name__icontains="+q+"&limit=20").then(function(r){return r.ok?r.json():{results:[]};}).catch(function(){return {results:[]};})
          .then(function(j2){
            return (j2.results||[]).filter(function(sp){
              var dk=(sp.key||"")+"|"+(sp.document&&(sp.document.key||sp.document.slug)||sp.document||"");
              return dk.toLowerCase().indexOf("2024")>=0;
            });
          });
      }
      return json.results;
    })
    .then(function(results){
      return (results||[]).map(function(sp){
        var lvl=typeof sp.level==="number"?sp.level:(parseInt(sp.level_int!==undefined?sp.level_int:sp.level)||0);
        var school=sp.school&&sp.school.name?sp.school.name:(typeof sp.school==="string"?sp.school:"");
        var desc=(sp.desc||"").toString();
        if(sp.higher_level) desc+="\n\n***At Higher Levels.*** "+sp.higher_level;
        var comp=[];if(sp.verbal)comp.push("V");if(sp.somatic)comp.push("S");if(sp.material)comp.push("M"+(sp.material_specified?" ("+sp.material_specified+")":""));
        var compStr=comp.length?comp.join(", "):(typeof sp.components==="string"?sp.components:"");
        return {name:sp.name,level:lvl,school:school,castingTime:sp.casting_time||"",range:sp.range_text||sp.range||"",components:compStr,duration:sp.duration||"",conc:!!sp.concentration,ritual:!!sp.ritual,classes:(sp.classes&&sp.classes.length?sp.classes.map(function(x){return x.name||x;}).join(", "):(sp.dnd_class||"")),desc:desc,src:"srd",srdVer:"24"};
      });
    });

    // Dedup within each version only; keep both 2014 and 2024 versions of the same spell
    function dedup(arr){var seen={};return arr.filter(function(sp){var k=sp.name.toLowerCase();if(seen[k])return false;seen[k]=true;return true;});}

}

// Maps an open5e monster onto a 5etools-shaped object so it can reuse the same
// statblock generators/parser as the local creature compendium.
function open5eMonsterToFiveTools(m){

  var ALN={lawful:"L",neutral:"N",chaotic:"C",good:"G",evil:"E",unaligned:"U",any:"A"};

  o.type=m.subtype?{type:(""+(m.type||"")).toLowerCase(),tags:[m.subtype]}:(""+(m.type||"beast")).toLowerCase();
  var al=(""+(m.alignment||"")).toLowerCase();
  if(al.indexOf("unaligned")>=0) o.alignment=["U"];
  else if(al.indexOf("any")>=0) o.alignment=["A"];
  else { var codes=al.split(/\s+/).map(function(w){return ALN[w];}).filter(Boolean); if(codes.length)o.alignment=codes; }

  o.hp={average:m.hit_points,formula:m.hit_dice};

  var sv={};O5K.forEach(function(k,i){var v=m[k+"_save"];if(v!=null&&v!=="")sv[ABK[i]]=(v>=0?"+"+v:""+v);});
  if(Object.keys(sv).length)o.save=sv;

  if(m.damage_resistances)o.resist=[m.damage_resistances];
  if(m.damage_immunities)o.immune=[m.damage_immunities];
  if(m.damage_vulnerabilities)o.vulnerable=[m.damage_vulnerabilities];
  if(m.condition_immunities)o.conditionImmune=[m.condition_immunities];
  if(m.senses)o.senses=[m.senses];
  o.languages=m.languages||"";
  o.cr=(""+(m.challenge_rating!=null?m.challenge_rating:(m.cr!=null?m.cr:""))).trim();
  function mapActs(arr){return (arr||[]).filter(function(a){return a&&a.name;}).map(function(a){return {name:a.name,entries:[(""+(a.desc||"")).trim()]};});}
  if(m.special_abilities&&m.special_abilities.length)o.trait=mapActs(m.special_abilities);
  if(m.actions&&m.actions.length)o.action=mapActs(m.actions);
  if(m.bonus_actions&&m.bonus_actions.length)o.bonus=mapActs(m.bonus_actions);
  if(m.reactions&&m.reactions.length)o.reaction=mapActs(m.reactions);
  if(m.legendary_actions&&m.legendary_actions.length)o.legendary=mapActs(m.legendary_actions);
  if(m.legendary_desc)o.legendaryHeader=[m.legendary_desc];
  return o;
}

// ─── Exploit compendium (laserllama Compendium of Exploits, raw text format) ─────
const EXPLOIT_MD_URL="https://raw.githubusercontent.com/liapatiso95-ctrl/character-sheet/main/exploits.md";
const _exploitCache={data:null,status:"idle"};
const _exploitListeners=[];
function _notifyExploitListeners(){_exploitListeners.forEach(function(fn){fn();});}

// Derive dice cost from an exploit's description text.
// "up to your Proficiency Bonus" => "up to PB"; otherwise "1 die".
function deriveExploitCost(desc){
  var d=(desc||"").toLowerCase();
  if(/up to your proficiency bonus/.test(d)) return "up to PB";
  return "1 die";
}

// Parse the raw laserllama Compendium text. A real entry is any line that is a name,
// immediately followed by a line matching "Nth-degree Exploit". Everything from the line
// after Execution (or after the last header field) until the next entry is the description.
function parseExploitMarkdown(md){
  var out={};
  var rawLines=md.replace(/\r\n/g,"\n").split("\n");
  // Find indices where a "<degree>-degree Exploit" line occurs; the line before it is the name.
  var degRe=/^(\d+)(?:st|nd|rd|th)-degree\s+Exploit\s*$/i;
  var entryStarts=[];
  for(var i=1;i<rawLines.length;i++){
    var m=rawLines[i].trim().match(degRe);
    if(m){
      var nameLine=(rawLines[i-1]||"").trim();
      // Name must be a non-empty, reasonably short line that isn't itself a field/heading
      if(nameLine && nameLine.length<=60 && !/[:.]$/.test(nameLine) && !/^(classes|prerequisites|execution)\b/i.test(nameLine)){
        entryStarts.push({nameIdx:i-1,degIdx:i,degree:parseInt(m[1])});
      }
    }
  }
  for(var e=0;e<entryStarts.length;e++){
    var cur=entryStarts[e];
    var endIdx=(e+1<entryStarts.length)?entryStarts[e+1].nameIdx:rawLines.length;
    var name=rawLines[cur.nameIdx].trim();
    var degree=cur.degree;
    var classes="",prereq="",execution="";
    var descLines=[];
    var sawHeaderField=false;
    for(var li=cur.degIdx+1;li<endIdx;li++){
      var ln=(rawLines[li]||"").trim();
      var kc=ln.match(/^Classes\s*[:：]\s*(.+)$/i);
      var kp=ln.match(/^Prerequisites\s*[:：]\s*(.+)$/i);
      var ke=ln.match(/^Execution\s*[:：]\s*(.+)$/i);
      if(kc){classes=kc[1].trim();sawHeaderField=true;continue;}
      if(kp){prereq=kp[1].trim();sawHeaderField=true;continue;}
      if(ke){execution=ke[1].trim();sawHeaderField=true;continue;}
      // Description lines come after the header fields
      if(sawHeaderField){
        descLines.push(rawLines[li]); // keep original (incl. blank lines for paragraphs)
      }
    }
    // Trim leading/trailing blank lines from description
    while(descLines.length&&!descLines[0].trim()) descLines.shift();
    while(descLines.length&&!descLines[descLines.length-1].trim()) descLines.pop();
    var desc=descLines.join("\n");
    if(!name) continue;
    out[name.toLowerCase()]={name:name,degree:degree,classes:classes,prereq:prereq,execution:execution,cost:deriveExploitCost(desc),desc:desc};
  }
  return out;
}

// ─── 5etools optionalfeature (LaserLlama exploit) JSON → markdown-parser shape ──
// NOTE: the JSON is lossy compared with the hand-authored markdown. Degree, cost,
// prereq and description convert faithfully; Classes and Execution are best-effort
// (the JSON encodes only exploit *families* and Foundry activation data, not the
// specific class list or the markdown's hand-written execution phrasing). When an
// exploit exists in both sources, the markdown wins, so authored entries keep their
// exact fields; only JSON-only exploits use this approximation.
const _EXPLOIT_FAMILY_CLASS={SE:"Barbarian",ME:"Fighter",DE:"Rogue",TE:"Warlord"};
// Pull the degree (1–5) and family classes out of featureType codes like "LL:1ME".
function _exploitDegreeAndClasses(featureType){
  var degree=0; var fams={};
  (featureType||[]).forEach(function(ft){
    var m=(""+ft).match(/(\d)?([SMDT]E)$/); // optional degree digit + family
    if(m){
      if(m[1]&&!degree) degree=parseInt(m[1]);
      var cls=_EXPLOIT_FAMILY_CLASS[m[2]];
      if(cls) fams[cls]=true;
    }
  });
  // Preserve a stable class order
  var order=["Barbarian","Fighter","Rogue","Warlord"];
  var classes=order.filter(function(c){return fams[c];}).join(", ");
  return {degree:degree,classes:classes};
}
// Best-effort execution string from a Foundry activity's activation block.
function _exploitExecution(opt){
  var acts=opt.foundryActivities||[];
  if(!acts.length) return "";
  var a=acts[0]||{};
  var act=a.activation||{};
  // activation may be {type,condition} or flattened "activation.type"
  var type=act.type||a["activation.type"]||"";
  var cond=act.condition||"";
  var label="";
  if(type==="action") label="1 action";
  else if(type==="bonus") label="1 bonus action";
  else if(type==="reaction") label="1 reaction";
  else if(type==="special") label=cond?strip5eTags(cond):"Special";
  else if(type) label="1 "+type;
  if(cond&&type!=="special"&&!/^(special)$/i.test(label)) label+=" ("+strip5eTags(cond)+")";
  return label.trim();
}
function convertExploitJson(arr){
  var out={};
  (arr||[]).forEach(function(opt){
    if(!opt||!opt.name) return;
    var dc=_exploitDegreeAndClasses(opt.featureType);
    var prereq=format5ePrerequisite(opt.prerequisite);
    if(!prereq) prereq="None";
    var desc=flatten5eEntries(opt.entries,[]).join("\n").trim();
    var execution=_exploitExecution(opt);
    out[opt.name.toLowerCase()]={
      name:opt.name,degree:dc.degree,classes:dc.classes,prereq:prereq,
      execution:execution,cost:deriveExploitCost(desc),desc:desc,source:opt.source||""
    };
  });
  return out;
}

  const [srdResults,setSrdResults]=React.useState([]);
  const [srdLoading,setSrdLoading]=React.useState(false);
  const debounceRef=React.useRef(null);

    if(inputRef.current){var r=inputRef.current.getBoundingClientRect();setRect({left:r.left,top:r.bottom,width:r.width});}
  },[]);

const FEAT_MD_URL="https://raw.githubusercontent.com/liapatiso95-ctrl/character-sheet/main/feats.md";
const _featCache={data:null,status:"idle"};
const _featListeners=[];
function _notifyFeatListeners(){_featListeners.forEach(function(fn){fn();});}

function parseFeatMarkdown(md){
  var feats={};
  var blocks=md.split(/^###\s+/m).slice(1);
  blocks.forEach(function(block){
    var lines=block.split("\n");
    var name=(lines[0]||"").trim();
    if(!name) return;
    var descLines=[];
    var prereq="";
    for(var li=1;li<lines.length;li++){
      var ln=lines[li].trim();
      if(!ln) continue;
      // Stop at section dividers (#, ##, ### — e.g. next feat group), but KEEP
      // #### sub-sections so embedded tables (e.g. a spells table) are captured.
      if(/^#{1,3}\s/.test(ln)) break;
      // Skip layout artifacts
      if(/^\\?(column|page)$/i.test(ln)||/^\{\{/.test(ln)) continue;
      // Strip ***Prerequisites...*** markers but keep the text
      var cleaned=ln.replace(/\*\*\*([^*]+)\*\*\*/g,"$1").replace(/\*\*([^*]+)\*\*/g,"$1").replace(/\*([^*]+)\*/g,"$1");
      if(!cleaned) continue;
      // Capture prerequisite/requirement line; keep it OUT of the body so it
      // can't pollute ability detection — it's re-echoed (as ***) at the top.
      var pm=cleaned.match(/^(?:Prerequisites?|Requirements?)\s*[:：]\s*(.+)$/i);
      if(pm){prereq=pm[1].trim();continue;}
      // Convert a bold label line into a markdown list item, keeping the bold.
      var boldLabel=ln.match(/^\*\*([^*]+)\*\*\.?\s*(.*)$/);
      if(boldLabel){
        var label=boldLabel[1].replace(/\.$/,"").trim();
        var rest=boldLabel[2].trim();
        descLines.push("- **"+label+".** "+rest);
      } else {
        descLines.push(ln); // keep markdown intact
      }
    }
    // Insert blank line before each "- " entry (except first)
    var formatted=[];
    descLines.forEach(function(ln2,idx){
      if(ln2.startsWith("- ")&&idx>0&&!descLines[idx-1].startsWith("- ")&&descLines[idx-1]!==""){
        formatted.push("");
      }
      formatted.push(ln2);
    });
    var fullDesc=formatted.join("\n").trim();
    // Skip stub entries with no description
    if(!fullDesc&&!prereq) return;
    // Detect ability scores from the body only (prereq excluded above).
    var abilities=[];
    var plainDesc=fullDesc.replace(/[*`_]/g,"");
    var asiMatch=plainDesc.match(/Ability Score Increase[^\n]*?\.([^\n]*)/i);
    var asiText=asiMatch?asiMatch[1]:"";
    var scanText=asiText||plainDesc;
    var ablMap=[["Strength","STR"],["Dexterity","DEX"],["Constitution","CON"],["Intelligence","INT"],["Wisdom","WIS"],["Charisma","CHA"]];
    if(/one ability score of your choice|any ability score/i.test(scanText)){
      abilities=["STR","DEX","CON","INT","WIS","CHA"];
    } else {
      ablMap.forEach(function(p){if(new RegExp("\\b"+p[0]+"\\b","i").test(scanText)) abilities.push(p[1]);});
    }
    // Echo the prerequisite as a bold-italic sub-header at the top.
    if(prereq) fullDesc=("***Prerequisite: "+prereq+"***\n"+fullDesc).trim();
    feats[name.toLowerCase()]={name,desc:fullDesc,prereq:prereq,abilities:abilities};
  });
  return feats;
}

// ─── 5etools prerequisite array → readable string ──────────────────────────────
const _ABIL_FULL={str:"Strength",dex:"Dexterity",con:"Constitution",int:"Intelligence",wis:"Wisdom",cha:"Charisma"};
function format5ePrerequisite(prereq){
  if(!Array.isArray(prereq)||!prereq.length) return "";
  // Each array element is an alternative ("OR"); within an element, parts are "AND".
  var alts=prereq.map(function(p){
    if(!p||typeof p!=="object") return "";
    var parts=[];
    if(p.level!=null){
      var lv=(typeof p.level==="object")?p.level.level:p.level;
      if(lv!=null) parts.push("Level "+lv);
    }
    if(Array.isArray(p.ability)){
      p.ability.forEach(function(ab){
        Object.keys(ab).forEach(function(k){
          var nm=_ABIL_FULL[k]||k;
          parts.push(nm+" "+ab[k]+" or higher");
        });
      });
    }
    if(Array.isArray(p.race)){
      var races=p.race.map(function(r){return (""+(r.name||r)).split("|")[0];});
      if(races.length) parts.push(races.join(" or "));
    }
    if(p.spellcasting||p.spellcasting2020||p.spellcastingFeature) parts.push("the ability to cast at least one spell");
    if(p.spellcastingPrepared) parts.push("Spellcasting feature");
    if(Array.isArray(p.feat)){
      var feats=p.feat.map(function(f){return titleCase((""+f).split("|")[0]);});
      if(feats.length) parts.push(feats.join(" or ")+" feat");
    }
    if(Array.isArray(p.feature)){
      var feA=p.feature.map(function(f){return titleCase((""+f).split("|")[0]);});
      if(feA.length) parts.push(feA.join(" or "));
    }
    if(Array.isArray(p.proficiency)){
      p.proficiency.forEach(function(pr){
        Object.keys(pr).forEach(function(k){
          parts.push("Proficiency with "+(""+pr[k]).split("|")[0]+" "+k);
        });
      });
    }
    if(Array.isArray(p.otherSummary)){
      p.otherSummary.forEach(function(o){if(o&&o.entrySummary)parts.push(strip5eTags(o.entrySummary));});
    } else if(p.otherSummary&&p.otherSummary.entrySummary){
      parts.push(strip5eTags(p.otherSummary.entrySummary));
    } else if(p.other){
      parts.push(strip5eTags(p.other));
    }
    if(p.background){
      var bg=Array.isArray(p.background)?p.background.map(function(b){return (""+(b.name||b)).split("|")[0];}):[(""+p.background).split("|")[0]];
      parts.push(bg.join(" or ")+" background");
    }
    // exclusiveFeatCategory and similar internal gating are not player-facing prose; skip.
    return parts.join(", ");
  }).filter(Boolean);
  // dedupe identical alternatives
  var seen={},uniq=[];
  alts.forEach(function(a){if(!seen[a]){seen[a]=1;uniq.push(a);}});
  return uniq.join(" or ");
}
// Detect which ability scores a feat can raise (same logic as the markdown parser).
function _featAbilities(fullDesc){
  var abilities=[];
  var asiMatch=fullDesc.match(/Ability Score Increase[^\n]*?\.([^\n]*)/i);
  var asiText=asiMatch?asiMatch[1]:"";
  var scanText=asiText||fullDesc;
  var ablMap=[["Strength","STR"],["Dexterity","DEX"],["Constitution","CON"],["Intelligence","INT"],["Wisdom","WIS"],["Charisma","CHA"]];
  if(/one ability score of your choice|any ability score/i.test(scanText)){
    abilities=["STR","DEX","CON","INT","WIS","CHA"];
  } else {
    ablMap.forEach(function(p){if(new RegExp("\\b"+p[0]+"\\b","i").test(scanText)) abilities.push(p[1]);});
  }
  return abilities;
}
// Render feat entries into the same "- Label. text" form the markdown parser emits.
function _featDescFromEntries(entries){
  var lines=[];
  (entries||[]).forEach(function(e){
    if(typeof e==="string"){ var s=strip5eTags(e).trim(); if(s)lines.push(s); }
    else if(e&&typeof e==="object"){
      if(e.name&&(e.entries||e.items)){
        var body=flatten5eEntries(e.entries||e.items,[]).join(" ").trim();
        var label=strip5eTags(e.name).replace(/\.$/,"").trim();
        lines.push("- **"+label+".** "+body);
      } else {
        flatten5eEntries(e,lines);
      }
    }
  });
  // Blank line before each "- " block (except first), matching the markdown parser.
  var formatted=[];
  lines.forEach(function(ln,idx){
    if(ln.indexOf("- ")===0&&idx>0&&lines[idx-1].indexOf("- ")!==0&&lines[idx-1]!=="") formatted.push("");
    formatted.push(ln);
  });
  return formatted.join("\n").trim();
}
function convertFeatJson(arr){
  var out={};
  (arr||[]).forEach(function(ft){
    if(!ft||!ft.name) return;
    var prereq=format5ePrerequisite(ft.prerequisite);
    var fullDesc=_featDescFromEntries(ft.entries);
    if(!fullDesc&&!prereq) return; // skip stubs
    var abilities=_featAbilities(fullDesc);
    if(prereq) fullDesc=("***Prerequisite: "+prereq+"***\n"+(fullDesc||"")).trim();
    out[ft.name.toLowerCase()]={name:ft.name,desc:fullDesc,prereq:prereq,abilities:abilities,source:ft.source||""};
  });
  return out;
}

function useFeatCompendium(){
  const [tick,setTick]=React.useState(0);
  React.useEffect(function(){
    function onUpdate(){setTick(function(t){return t+1;});}
    _featListeners.push(onUpdate);
    if(_featCache.status==="idle"){
      _featCache.status="loading";
      _featCache.data={};
      var pending=2;
      function done(){pending--;if(pending<=0)_featCache.status="ready";_notifyFeatListeners();}
      fetch(FEAT_MD_URL)
        .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.text();})
        .then(function(text){var md=parseFeatMarkdown(text);Object.keys(md).forEach(function(k){if(!_featCache.data[k])_featCache.data[k]=md[k];});})
        .catch(function(){})
        .finally(function(){done();});
      loadCompendiumJsonFolder("feats","feat",convertFeatJson,_featCache.data,done);
    }
    return function(){var idx=_featListeners.indexOf(onUpdate);if(idx>=0)_featListeners.splice(idx,1);};
  },[]);
  return _featCache;
}

// Open5e SRD feat search — pulls from both v1 and v2, filtered to SRD documents.
function open5eFeatSearch(query){
  var q=encodeURIComponent(query);
  function fmtFeatDesc(prereq,body){
    var desc="";
    if(prereq&&(""+prereq).toLowerCase()!=="none"&&(""+prereq).trim()) desc+="***Prerequisite: "+prereq+"***\n";
    body=(""+(body||"")).replace(/^\s*\*\*([^*]+?)\.?\*\*\.?\s*/gm,"- **$1.** ");
    return (desc+body).trim();
  }
  function abilitiesFromText(txt){
    txt=""+(txt||"");
    var asi=txt.match(/Ability Score Increase[^\n]*?\.([^\n]*)/i);
    var scan=asi?asi[1]:txt;
    if(/one ability score of your choice|any ability score/i.test(scan)) return ["STR","DEX","CON","INT","WIS","CHA"];
    var out=[];[["Strength","STR"],["Dexterity","DEX"],["Constitution","CON"],["Intelligence","INT"],["Wisdom","WIS"],["Charisma","CHA"]].forEach(function(p){if(new RegExp("\\b"+p[0]+"\\b","i").test(scan)) out.push(p[1]);});
    return out;
  }
  var v1=fetch("https://api.open5e.com/v1/feats/?search="+q+"&limit=15").then(function(r){return r.ok?r.json():{results:[]};}).catch(function(){return {results:[]};})
    .then(function(json){
      return (json.results||[]).filter(function(ft){return isSrdDoc(ft.document__slug);}).map(function(ft){
        var body=ft.effects_desc&&ft.effects_desc.length?ft.effects_desc.join("\n"):(ft.desc||"");
        var fd=fmtFeatDesc(ft.prerequisite,body);
        return {name:ft.name,desc:fd,prereq:(ft.prerequisite&&ft.prerequisite.toLowerCase()!=="none")?ft.prerequisite:"",abilities:abilitiesFromText(body),src:"srd",srdVer:"14"};
      });
    });
  var v2=fetch("https://api.open5e.com/v2/feats/?name__icontains="+q+"&document__key=srd-2024&limit=15").then(function(r){return r.ok?r.json():{results:[]};}).catch(function(){return {results:[]};})
    .then(function(json){
      if(!json.results||json.results.length===0){
        return fetch("https://api.open5e.com/v2/feats/?name__icontains="+q+"&limit=20").then(function(r){return r.ok?r.json():{results:[]};}).catch(function(){return {results:[]};})
          .then(function(j2){return (j2.results||[]).filter(function(ft){var dk=(ft.key||"")+"|"+(ft.document&&(ft.document.key||ft.document.slug)||ft.document||"");return dk.toLowerCase().indexOf("2024")>=0;});});
      }
      return json.results;
    })
    .then(function(results){
      return (results||[]).map(function(ft){
        var body="";
        if(ft.benefits&&ft.benefits.length){body=ft.benefits.map(function(b){return (b.name?"**"+b.name+".** ":"")+(b.desc||b.description||"");}).join("\n");}
        else body=ft.desc||ft.description||"";
        var pre=ft.prerequisite||(ft.prerequisites&&ft.prerequisites.length?ft.prerequisites.join(", "):"");
        var fd=fmtFeatDesc(pre,body);
        return {name:ft.name,desc:fd,prereq:(pre&&(""+pre).toLowerCase()!=="none")?pre:"",abilities:abilitiesFromText(body),src:"srd",srdVer:"24"};
      });
    });
  return Promise.all([v1,v2]).then(function(arrs){
    function dedup(arr){var seen={};return arr.filter(function(ft){var k=ft.name.toLowerCase();if(seen[k])return false;seen[k]=true;return true;});}
    return dedup(arrs[0]).concat(dedup(arrs[1]));
  });
}

// Detect "has N charges" and "regains XdY+Z charges" in an item description.
// Returns {enabled,max,used,restore} ready for the charge tracker, or null.
function parseChargesFromDesc(desc){
  if(!desc) return null;
  var text=desc.toLowerCase();
  var maxMatch=text.match(/(?:has|maximum of|with|holds|contains)\s+(\d+)\s+charges/)
            || text.match(/(\d+)\s+charges\b/);
  if(!maxMatch) return null;
  var max=parseInt(maxMatch[1]);
  if(!max||max<=0) return null;
  var restore="";
  var resMatch=text.match(/(?:regains?|recovers?|restores?)\s+(\d*d\d+\s*(?:[+-]\s*\d+)?|\d+)\s+(?:expended\s+)?charges/);
  if(resMatch) restore=resMatch[1].replace(/\s+/g,"");
  return {enabled:true,max:String(max),used:"0",restore:restore,msg:null};
}

function parseItemMarkdown(md){

    var name=(lines[0]||"").trim();
