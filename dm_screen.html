      if(fAttune==="no"&&r.attune!==false) return false;
      if(fType.trim()&&!matchQuery(r.type,fType)) return false;
      if(fAttuneTag.trim()&&!matchQuery(r.attuneTag,fAttuneTag)) return false;
    }
    if(kind==="feats"){
      var hasPre=!!(r.prereq&&(""+r.prereq).trim());
      if(fPrereq==="yes"&&!hasPre) return false;
      if(fPrereq==="no"&&hasPre) return false;
      if(fPrereq==="yes"&&fPrereqText.trim()&&!matchQuery(r.prereq,fPrereqText)) return false;
      if(fAbilities.length>0){
        var ab=r.abilities||[];
        // Match if the feat can increase ANY of the selected abilities
        var any=fAbilities.some(function(a){return ab.indexOf(a)>=0;});
        if(!any) return false;
      }
    }
    if(kind==="exploits"){
      if(fDegree!=="any"&&r.degree!==parseInt(fDegree)) return false;
      if(fExClass.trim()&&!matchQuery(r.classes,fExClass)) return false;
      if(fExec.trim()&&!matchQuery(r.execution,fExec)) return false;
    }
    if(kind==="creatures"){
      if(fCType!=="any"&&String(r.ctype||"").toLowerCase().indexOf(fCType.toLowerCase())<0) return false;
      if(fEnv!=="any"&&(r.environment||"").toLowerCase().indexOf(fEnv.toLowerCase())<0) return false;
      if(fCrMin!=="any"||fCrMax!=="any"){
        var crn=crToNum(r.cr);
        if(crn==null) return false;
        if(fCrMin!=="any"&&crn<crToNum(fCrMin)) return false;
        if(fCrMax!=="any"&&crn>crToNum(fCrMax)) return false;
      }
      if(fAbl!=="any"&&((""+fAblMin).trim()!==""||(""+fAblMax).trim()!=="")){
        var sv=parseInt(r.creature&&r.creature.stats&&r.creature.stats[fAbl]);
        if(isNaN(sv)) return false;
        if((""+fAblMin).trim()!==""&&sv<parseInt(fAblMin)) return false;
        if((""+fAblMax).trim()!==""&&sv>parseInt(fAblMax)) return false;
      }
    }
    return true;
  });
  // Sort: file first, then by name (spells by level then name)
  results.sort(function(a,b){
    if(kind==="spells"){var la=a.level||0,lb=b.level||0;if(la!==lb)return la-lb;}
    if(kind==="exploits"){var da=a.degree||0,db=b.degree||0;if(da!==db)return da-db;}
    if(kind==="creatures"){var ca=crToNum(a.cr);var cb=crToNum(b.cr);ca=(ca==null?-1:ca);cb=(cb==null?-1:cb);if(ca!==cb)return ca-cb;}
    // When searching by name, surface exact match first, then prefix matches.
    if(nq){
      var an=(a.name||"").toLowerCase(),bn=(b.name||"").toLowerCase();
      var ar=an===nq?0:(an.indexOf(nq)===0?1:2);
      var br=bn===nq?0:(bn.indexOf(nq)===0?1:2);
      if(ar!==br) return ar-br;
    }
    return (a.name||"").localeCompare(b.name||"");
  });
  var PER_PAGE=pageSize;
  var totalResults=results.length;
  var totalPages=Math.max(1,Math.ceil(totalResults/PER_PAGE));
  var curPage=Math.min(page,totalPages-1);
  var pageResults=results.slice(curPage*PER_PAGE,curPage*PER_PAGE+PER_PAGE);

  // Stable row id for a result at absolute index `i` in `results` (matches the
  // render loop below so expand/highlight state lines up).
  function rowId(r,i){return r.src+"-"+(r.srdVer||"")+"-"+r.name+"-"+i;}
  // Pick one item at random from the currently-shown (filtered) results, jump to
  // its page, expand it, and highlight it. Uses `results` (all pages), not just
  // the current page, so it honours every active filter and search term.
  function chooseRandomItem(){
    if(!results.length) return;
    var i=Math.floor(Math.random()*results.length);
    var id=rowId(results[i],i);
    setPage(Math.floor(i/PER_PAGE));
    setPickedId(id);
    setExpanded(function(e){var n=Object.assign({},e);n[id]=true;return n;});
  }

  var SCHOOLS=["Abjuration","Conjuration","Divination","Enchantment","Evocation","Illusion","Necromancy","Transmutation"];
  var inputStyle={background:"rgba(0,0,0,.3)",border:"1px solid rgba(201,150,42,.2)",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:13,outline:"none",padding:"5px 8px",borderRadius:2};
  var selStyle=Object.assign({},inputStyle,{cursor:"pointer"});
  var qhKey={fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:700,color:"var(--arcane)",textAlign:"center"};

  var tabBtn=function(k,label){return <div onClick={function(){switchKind(k);}} style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:1.5,textTransform:"uppercase",padding:"6px 16px",borderRadius:2,userSelect:"none",border:"1px solid "+(kind===k?"var(--gold)":"rgba(201,150,42,.2)"),background:kind===k?"rgba(201,150,42,.12)":"transparent",color:kind===k?"var(--gold-l)":"rgba(232,213,176,.45)"}}>{label}</div>;};

  function toggle(id){setExpanded(function(e){var n=Object.assign({},e);n[id]=!n[id];return n;});}

  // Shared duplicate matcher for spells. Two spells are the same if all identity fields match
  // UNDER THE SAME CLASS (empty class = "Other Spells"). Notes (nt) and prep status are ignored.
  function spellMatches(sp,candidate){
    var norm=function(x){return (x||"").toString().trim().toLowerCase();};
    return norm(sp.nm)===norm(candidate.nm)
        && norm(sp.sc)===norm(candidate.sc)
        && norm(sp.ti)===norm(candidate.ti)
        && norm(sp.rng)===norm(candidate.rng)
        && norm(sp.cmp)===norm(candidate.cmp)
        && norm(sp.dur)===norm(candidate.dur)
        && (!!sp.conc)===(!!candidate.conc)
        && (!!sp.ritual)===(!!candidate.ritual)
        && norm(sp.cls)===norm(candidate.cls);
  }

  // Exploit duplicate matcher — same name + degree + class (empty class = unassigned).
  function exploitMatches(ex,candidate){
    var norm=function(x){return (x||"").toString().trim().toLowerCase();};
    return norm(ex.nm)===norm(candidate.nm)
        && norm(ex.cls)===norm(candidate.cls);
  }

  function doAdd(r,clsName){
    if(kind==="spells"){
      var lv=r.level||0;
      var candidate={nm:r.name||"",ti:r.castingTime||"",rng:r.range||"",cmp:r.components||"",dur:r.duration||"",conc:!!r.conc,prep:false,nt:r.desc||"",cls:clsName||"",sc:r.school||"",ritual:!!r.ritual};
      var existing=(c.sp&&c.sp[lv])||[];
      var alreadyExists=existing.some(function(sp){return spellMatches(sp,candidate);});
      if(alreadyExists){
        setConfirmAdd(null);
        setSkippedInfo({names:[candidate.nm],cls:clsName||""});
        return;
      }
      var cp=Object.assign({},c.sp);
      cp[lv]=existing.concat([candidate]);
      s("sp",cp);
    } else if(kind==="feats"){
      s("fts",(c.fts||[]).concat([{nm:r.name||"",ds:r.desc||"",lv:"",limited:false,limits:[{name:"",uses:"",exp:"",die:"NO",recharge:""}]}]));
    } else if(kind==="items"){
      var ch=r.charges||parseChargesFromDesc(r.desc);
      var newInv=(c.inv||[]).concat([{nm:r.name||"",qt:"1",wt:r.weight||"",nt:r.cost?"Cost: "+r.cost:"",desc:r.desc||"",showDesc:!!r.desc,eq:false,wl:false,charges:ch||null}]);
      s("inv",newInv);
      // Only prompt when WE inferred the weight (the item had no official weight).
      if(r.weightInferred){

    } else if(kind==="exploits"){
      var deg=r.degree||1;
      var candidate={nm:r.name||"",uses:r.cost||"1 die",exec:r.execution||"",prereq:r.prereq||"",desc:r.desc||"",nt:"",used:false,cls:clsName||"",showDesc:false};
      var existingEx=(c.expl&&c.expl[deg])||[];
      var dup=existingEx.some(function(ex){return exploitMatches(ex,candidate);});
      if(dup){
        setConfirmAdd(null);
        setSkippedInfo({names:[candidate.nm],cls:clsName||""});
        return;
      }
      var cpe=Object.assign({},c.expl);
      cpe[deg]=existingEx.concat([candidate]);
      s("expl",cpe);
    }
    setConfirmAdd(null);
  }

  function doAddAll(clsName){
    // Add all current filtered results to the spell list, skipping any spell already present
    // UNDER THE SAME CLASS. Collects the names of skipped spells to report afterward.
    // Deep-copy each level array so mutations don't affect the original and
    // so we check against the growing list (catches duplicates within the batch too).
    var newSp={};
    Object.keys(c.sp||{}).forEach(function(lv){ newSp[lv]=(c.sp[lv]||[]).slice(); });
    var skipped=[];
    results.forEach(function(r){
      var lv=r.level||0;
      var candidate={nm:r.name||"",ti:r.castingTime||"",rng:r.range||"",cmp:r.components||"",dur:r.duration||"",conc:!!r.conc,prep:false,nt:r.desc||"",cls:clsName||"",sc:r.school||"",ritual:!!r.ritual};
      if(!newSp[lv]) newSp[lv]=[];
      var alreadyExists=newSp[lv].some(function(sp){return spellMatches(sp,candidate);});
      if(!alreadyExists){
        newSp[lv].push(candidate);
      } else {
        skipped.push(candidate.nm);
      }
    });
    s("sp",newSp);
    setConfirmAddAll(false);
    if(skipped.length>0) setSkippedInfo({names:skipped,cls:clsName||""});
  }

  function doAddAllExploits(clsName){
    // Add all current filtered exploit results, skipping any already present under the same class.
    var newExpl={};

      if(!newExpl[deg]) newExpl[deg]=[];

      if(!dup){ newExpl[deg].push(candidate); }
      else { skipped.push(candidate.nm); }
    });
    s("expl",newExpl);
    setConfirmAddAll(false);

  }

              title="Reveal the monster compendium for this visit only. It hides again when you leave and re-enter the Compendium."
              style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1.5,textTransform:"uppercase",color:"rgba(232,213,176,.3)",border:"1px dashed rgba(201,150,42,.22)",padding:"6px 12px",borderRadius:3,userSelect:"none"}}>

              Every search box understands these operators. They combine plain words (matched as “contains”, case-insensitive):

            <div style={{fontFamily:"'EB Garamond',serif",fontSize:13,color:"rgba(232,213,176,.6)",marginBottom:18,lineHeight:1.6}}>
              This will add all <span style={{color:"var(--arcane-l)",fontWeight:600}}>{totalResults} spell{totalResults===1?"":"s"}</span> from your current search results to your spell list. Spells already in your list will be skipped.
            </div>
            {(c.spellClasses||[]).length>0?(
              <div style={{marginBottom:18}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1,color:"rgba(232,213,176,.45)",textTransform:"uppercase",marginBottom:6}}>Add under class</div>
                <select value={addCls} onChange={function(e){setAddCls(e.target.value);}}
                  style={{width:"100%",background:"rgba(0,0,0,.3)",border:"1px solid rgba(123,79,207,.3)",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:13,outline:"none",padding:"6px 8px",borderRadius:2,cursor:"pointer"}}>
                  {(c.spellClasses||[]).map(function(sc,i){var nm=sc.nm||("Spellcasting "+(i+1));return <option key={i} value={sc.nm||""}>{nm}</option>;})}
                  <option value="">Other Spells</option>
                </select>
              </div>
            ):(
              <div style={{marginBottom:18,fontFamily:"'EB Garamond',serif",fontSize:12,fontStyle:"italic",color:"rgba(232,213,176,.4)"}}>No spellcasting classes defined — they will be added under "Other Spells".</div>
            )}
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <div onClick={function(){setConfirmAddAll(false);}}
                style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:1,textTransform:"uppercase",padding:"6px 14px",borderRadius:2,userSelect:"none",border:"1px solid rgba(232,213,176,.2)",color:"rgba(232,213,176,.5)"}}>Cancel</div>
              <div onClick={function(){doAddAll(addCls);}}
                style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:1,textTransform:"uppercase",padding:"6px 14px",borderRadius:2,userSelect:"none",border:"1px solid rgba(123,79,207,.6)",color:"rgba(184,154,240,.9)",background:"rgba(123,79,207,.15)"}}>Add All</div>
            </div>
          </div>
        </div>
      )}
      {confirmAddAll&&kind==="exploits"&&(
        <div onClick={function(){setConfirmAddAll(false);}}
          style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.7)",zIndex:100000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={function(e){e.stopPropagation();}}
            style={{background:"#1a1410",border:"1px solid rgba(201,74,42,.5)",borderRadius:4,padding:"22px 26px",maxWidth:400,boxShadow:"0 8px 40px rgba(0,0,0,.8)"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:13,letterSpacing:1,color:"#e07060",marginBottom:10}}>Add All {totalResults} Exploit{totalResults===1?"":"s"} to Exploit List?</div>
            <div style={{fontFamily:"'EB Garamond',serif",fontSize:13,color:"rgba(232,213,176,.6)",marginBottom:18,lineHeight:1.6}}>
              This will add all <span style={{color:"#e07060",fontWeight:600}}>{totalResults} exploit{totalResults===1?"":"s"}</span> from your current search results to your exploit list. Exploits already in your list will be skipped.
            </div>
            {(c.exploitClasses||[]).length>0?(
              <div style={{marginBottom:18}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1,color:"rgba(232,213,176,.45)",textTransform:"uppercase",marginBottom:6}}>Add under class</div>
                <select value={addCls} onChange={function(e){setAddCls(e.target.value);}}
                  style={{width:"100%",background:"rgba(0,0,0,.3)",border:"1px solid rgba(201,74,42,.3)",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:13,outline:"none",padding:"6px 8px",borderRadius:2,cursor:"pointer"}}>
                  {(c.exploitClasses||[]).map(function(ec,i){var nm=ec.nm||("Exploit Class "+(i+1));return <option key={i} value={ec.nm||""}>{nm}</option>;})}
                  <option value="">Other / Unassigned</option>
                </select>
              </div>
            ):(
              <div style={{marginBottom:18,fontFamily:"'EB Garamond',serif",fontSize:12,fontStyle:"italic",color:"rgba(232,213,176,.4)"}}>No exploit classes defined — they will be added unassigned.</div>
            )}
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <div onClick={function(){setConfirmAddAll(false);}}
                style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:1,textTransform:"uppercase",padding:"6px 14px",borderRadius:2,userSelect:"none",border:"1px solid rgba(232,213,176,.2)",color:"rgba(232,213,176,.5)"}}>Cancel</div>
              <div onClick={function(){doAddAllExploits(addCls);}}
                style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:1,textTransform:"uppercase",padding:"6px 14px",borderRadius:2,userSelect:"none",border:"1px solid rgba(201,74,42,.6)",color:"#e07060",background:"rgba(201,74,42,.15)"}}>Add All</div>
            </div>
          </div>
        </div>
      )}
      {weightPrompt&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.7)",zIndex:100002,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={function(e){e.stopPropagation();}}
            style={{background:"#1a1410",border:"1px solid rgba(201,150,42,.4)",borderRadius:4,padding:"22px 26px",maxWidth:360,boxShadow:"0 8px 40px rgba(0,0,0,.8)"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:13,letterSpacing:1,color:"var(--gold-l)",marginBottom:10}}>Confirm Item Weight</div>
            <div style={{fontFamily:"'EB Garamond',serif",fontSize:14,color:"rgba(232,213,176,.7)",marginBottom:14,lineHeight:1.5}}>
              <span style={{color:"var(--gold-l)",fontWeight:600}}>{weightPrompt.name}</span> has no officially assigned weight. The proposed weight below is an estimate — adjust it if you like (enter 0 if it's weightless):
            </div>
            <input autoFocus type="number" value={weightVal} onChange={function(e){setWeightVal(e.target.value);}}
              onKeyDown={function(e){if(e.key==="Enter"){var cp=[...(c.inv||[])];if(cp[weightPrompt.invIndex]){cp[weightPrompt.invIndex]={...cp[weightPrompt.invIndex],wt:weightVal.trim()===""?"0":weightVal.trim()};s("inv",cp);}setWeightPrompt(null);}}}
              placeholder="0" style={{width:"100%",background:"rgba(0,0,0,.3)",border:"1px solid rgba(201,150,42,.25)",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:14,outline:"none",padding:"7px 9px",borderRadius:2,marginBottom:16}} />
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <div onClick={function(){var cp=[...(c.inv||[])];if(cp[weightPrompt.invIndex]){cp[weightPrompt.invIndex]={...cp[weightPrompt.invIndex],wt:weightVal.trim()===""?"0":weightVal.trim()};s("inv",cp);}setWeightPrompt(null);}}
                style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:1,textTransform:"uppercase",padding:"6px 14px",borderRadius:2,userSelect:"none",border:"1px solid rgba(74,156,92,.5)",color:"rgba(74,156,92,.9)",background:"rgba(74,156,92,.12)"}}>Confirm Weight</div>
            </div>
          </div>
        </div>
      )}
      {skippedInfo&&(
        <div onClick={function(){setSkippedInfo(null);}}
          style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.7)",zIndex:100001,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={function(e){e.stopPropagation();}}
            style={{background:"#1a1410",border:"1px solid rgba(201,150,42,.4)",borderRadius:4,padding:"22px 26px",maxWidth:420,maxHeight:"70vh",overflowY:"auto",boxShadow:"0 8px 40px rgba(0,0,0,.8)"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:13,letterSpacing:1,color:"var(--gold-l)",marginBottom:10}}>{(function(){var w=kind==="exploits"?"Exploit":"Spell";return skippedInfo.names.length===1?(w+" Already in List"):(skippedInfo.names.length+" "+w+"s Already in List");})()}</div>
            <div style={{fontFamily:"'EB Garamond',serif",fontSize:13,color:"rgba(232,213,176,.6)",marginBottom:14,lineHeight:1.6}}>
              The following {kind==="exploits"?(skippedInfo.names.length===1?"exploit was":"exploits were"):(skippedInfo.names.length===1?"spell was":"spells were")} not added because {skippedInfo.names.length===1?"it already exists":"they already exist"} under <span style={{color:"var(--gold-l)",fontWeight:600}}>{skippedInfo.cls?skippedInfo.cls:(kind==="exploits"?"Other / Unassigned":"Other Spells")}</span>:
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:18,paddingLeft:4}}>
              {skippedInfo.names.map(function(nm,i){return (
                <div key={i} style={{fontFamily:"'EB Garamond',serif",fontSize:13,color:"var(--parch)"}}>• {nm}</div>
              );})}
            </div>
            <div style={{display:"flex",justifyContent:"flex-end"}}>
              <div onClick={function(){setSkippedInfo(null);}}
                style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:1,textTransform:"uppercase",padding:"6px 16px",borderRadius:2,userSelect:"none",border:"1px solid rgba(201,150,42,.5)",color:"var(--gold-l)",background:"rgba(201,150,42,.12)"}}>OK</div>
            </div>
          </div>
        </div>
      )}
      {lightbox&&(
        <div onClick={function(){setLightbox(null);}}
          style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.9)",zIndex:100005,display:"flex",alignItems:"center",justifyContent:"center",padding:20,cursor:"zoom-out"}}>
          <img src={lightbox} alt="" onClick={function(e){e.stopPropagation();setLightbox(null);}}
            style={{maxWidth:"95vw",maxHeight:"95vh",objectFit:"contain",borderRadius:4,boxShadow:"0 8px 50px rgba(0,0,0,.9)",cursor:"zoom-out"}} />
        </div>
      )}
    </div>
  );
}

const PAGES=[
  {label:"I - Character",hideable:false},
  {label:"II - Features",hideable:false},
  {label:"III - Inventory",hideable:false},
  {label:"IV - Notes",hideable:true},
  {label:"V - Spells",hideable:true,group:"spells"},
  {label:"VI - Exploits",hideable:true},
  {label:"VII - Creatures",hideable:true},
  {label:"VIII - Dice Roller",hideable:true},
  {label:"IX - Compendium",hideable:true},
];


function Page4({c,s}){
  const ui=(k,i,f,v)=>s(k,prev=>{const a=[...prev];a[i]={...a[i],[f]:v};return a;});
  const di=(k,i)=>s(k,prev=>prev.filter((_,j)=>j!==i));
  const ai=(k,row)=>s(k,prev=>[...prev,row]);
  // Show/hide note bodies (markdown). Each list item carries a showDesc flag.
  const setAllDesc=(k,val)=>s(k,prev=>(prev||[]).map(it=>({...it,showDesc:val})));
  const toggleDesc=(k,i)=>s(k,prev=>(prev||[]).map((it,j)=>j===i?{...it,showDesc:it.showDesc===false}:it));
  const ecBtn={cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:9,color:"rgba(184,154,240,.5)",border:"1px solid rgba(184,154,240,.2)",padding:"0 6px",borderRadius:2,userSelect:"none",lineHeight:"15px"};
  const chevSt={cursor:"pointer",flexShrink:0,fontFamily:"'Cinzel',serif",fontSize:12,color:"rgba(184,154,240,.55)",userSelect:"none",alignSelf:"flex-start",paddingTop:6,width:12,textAlign:"center"};
  const descBtns=(k)=>((c[k]||[]).length>0?<span style={{display:"inline-flex",gap:3}}>
    <span onClick={()=>setAllDesc(k,true)} title="Expand all" style={ecBtn}>+</span>
    <span onClick={()=>setAllDesc(k,false)} title="Collapse all" style={ecBtn}>−</span>
  </span>:null);
  const mdPreview=(t)=>((t||"").replace(/[*_#>`~]/g," ").replace(/\s+/g," ").trim());
  const collapsedRow=(k,i,t)=><div onClick={()=>toggleDesc(k,i)} title="Show notes"
    style={{cursor:"pointer",color:"rgba(232,213,176,.3)",fontFamily:"'EB Garamond',serif",fontSize:13,fontStyle:"italic",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",padding:"4px 2px"}}>{mdPreview(t)||"(empty — click to add notes)"}</div>;
  const {useState:us}=React;
  const [sub,setSub]=us("npc");
  const [noteSearch,setNoteSearch]=us("");
  const nq=noteSearch.trim().toLowerCase();
  const fIdx=(arr)=>(arr||[]).map(function(it,i){return {it:it,i:i};}).filter(function(x){
    if(!nq) return true;
    try{return Object.keys(x.it).some(function(k){var v=x.it[k];return typeof v==="string"&&v.toLowerCase().indexOf(nq)>=0;});}catch(e){return true;}
  });
  // Custom user-defined sections — each {id, name, items:[{ti,tx,showDesc}]}
  const csList=c.customSections||[];
  const csUpd=(id,fn)=>s("customSections",(c.customSections||[]).map(cs=>cs.id===id?fn(cs):cs));
  const csItemUI=(id,i,f,v)=>csUpd(id,cs=>({...cs,items:cs.items.map((it,j)=>j===i?{...it,[f]:v}:it)}));
  const csItemDel=(id,i)=>csUpd(id,cs=>({...cs,items:cs.items.filter((_,j)=>j!==i)}));
  const csItemAdd=(id)=>csUpd(id,cs=>({...cs,items:[...(cs.items||[]),{ti:"",tx:""}]}));
  const csItemToggle=(id,i)=>csUpd(id,cs=>({...cs,items:cs.items.map((it,j)=>j===i?{...it,showDesc:it.showDesc===false}:it)}));
  const csSetAllDesc=(id,val)=>csUpd(id,cs=>({...cs,items:(cs.items||[]).map(it=>({...it,showDesc:val}))}));
  const csDelete=(id)=>{s("customSections",(c.customSections||[]).filter(cs=>cs.id!==id));setSub("npc");};
  const csAdd=()=>{var id=Date.now()+Math.random();s("customSections",[...(c.customSections||[]),{id:id,name:"New Section",items:[]}]);setSub("cs:"+id);};
  const subTabs=[
    {key:"npc",label:"NPCs",n:(c.npc||[]).length},
    {key:"locations",label:"Locations",n:(c.locations||[]).length},
    {key:"lore",label:"Lore",n:(c.lore||[]).length},
    {key:"factions",label:"Organisations",n:(c.factions||[]).length},
    {key:"nt1",label:"Session Notes",n:(c.nt1||[]).length},
    {key:"nt3",label:"Other Notes",n:(c.nt3||[]).length},
  ].concat(csList.map(function(cs){return {key:"cs:"+cs.id,label:cs.name||"Untitled",n:(cs.items||[]).length};}));
  return (
    <div>
      <div className="orn">Notes</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:34,marginTop:14}}>
        {subTabs.map(function(t){
          var active=sub===t.key;
          return <button key={t.key} onClick={function(){setSub(t.key);}}
            style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:1.5,textTransform:"uppercase",padding:"7px 13px",cursor:"pointer",borderRadius:2,transition:"all .2s",display:"flex",alignItems:"center",gap:7,
              background:active?"linear-gradient(135deg,rgba(123,79,207,.3),rgba(201,150,42,.15))":"rgba(20,14,8,.8)",
              border:"1px solid "+(active?"var(--gold)":"rgba(201,150,42,.25)"),
              color:active?"var(--gold-l)":"#a08c5a"}}>
            {t.label}
            <span style={{fontFamily:"'Cinzel',serif",fontSize:9,minWidth:16,textAlign:"center",padding:"1px 5px",borderRadius:9,
              background:active?"rgba(201,150,42,.25)":"rgba(0,0,0,.35)",
              color:active?"var(--gold-l)":"rgba(232,213,176,.45)",
              border:"1px solid "+(active?"rgba(201,150,42,.4)":"rgba(201,150,42,.12)")}}>{t.n}</span>
          </button>;
        })}
        <button onClick={csAdd} title="Add a new custom section"
          style={{fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:1,textTransform:"uppercase",padding:"7px 12px",cursor:"pointer",borderRadius:2,transition:"all .2s",
            background:"transparent",border:"1px dashed rgba(123,79,207,.4)",color:"rgba(184,154,240,.7)"}}>+ Section</button>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:18,marginTop:-18}}>
        <span style={{fontFamily:"'EB Garamond',serif",fontSize:13,color:"rgba(201,150,42,.4)"}}>⌕</span>
        <input value={noteSearch} onChange={e=>setNoteSearch(e.target.value)} placeholder="Search notes by name or text…"
          style={{flex:1,maxWidth:360,background:"rgba(0,0,0,.3)",border:"none",borderBottom:"1px solid rgba(201,150,42,.25)",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:14,padding:"5px 4px",outline:"none"}} />
        {noteSearch&&<span onClick={()=>setNoteSearch("")} title="Clear search" style={{cursor:"pointer",color:"rgba(201,74,42,.5)",fontSize:16,userSelect:"none"}}>×</span>}
      </div>
      {sub==="npc"&&<div>
      <div className="sh">NPCs {descBtns("npc")}</div>
      {fIdx(c.npc).map(function(x){var n=x.it,i=x.i;var open=n.showDesc!==false;return (
        <div key={i} className="nc">
          <span onClick={()=>toggleDesc("npc",i)} title={open?"Hide notes":"Show notes"} style={chevSt}>{open?"▾":"▸"}</span>
          <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
            {["ally","enemy","neutral"].map(function(t){
              var active=n.ty===t;
              return <div key={t} onClick={function(){ui("npc",i,"ty",t);}}
                style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1.5,textTransform:"uppercase",padding:"3px 8px",
                  background:active?(t==="ally"?"rgba(74,156,92,.2)":t==="enemy"?"rgba(201,74,42,.2)":"rgba(42,140,156,.2)"):"rgba(0,0,0,.2)",
                  border:"1px solid "+(active?(t==="ally"?"rgba(74,156,92,.4)":t==="enemy"?"rgba(201,74,42,.4)":"rgba(42,140,156,.4)"):"rgba(201,150,42,.1)"),
                  color:active?(t==="ally"?"#6dbb80":t==="enemy"?"#e07060":"#60b4c4"):"rgba(232,213,176,.25)",
                  transition:"all .15s",userSelect:"none"}}>
                {t}
              </div>;
            })}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <input className="fi" value={n.nm||""} onChange={e=>ui("npc",i,"nm",e.target.value)} placeholder="Name..." style={{marginBottom:6,width:"100%"}} />
            <input className="fi" value={n.rl||""} onChange={e=>ui("npc",i,"rl",e.target.value)} placeholder="Role / Relation..." style={{marginBottom:6,width:"100%"}} />
            {open
              ?<MdField className="fi" value={n.nt||""} onChange={e=>ui("npc",i,"nt",e.target.value)} placeholder="Notes... (markdown supported)" style={{minHeight:64,width:"100%"}} />
              :collapsedRow("npc",i,n.nt)}
          </div>
          <button className="db" onClick={()=>window.__confirm("Delete this NPC?",()=>di("npc",i))}>x</button>
        </div>
      );})}
      <button className="arb" onClick={()=>ai("npc",{nm:"",rl:"",nt:"",ty:"neutral"})}>+ Add NPC</button>
      </div>}

      {sub==="locations"&&<div>
      <div className="sh">Locations {descBtns("locations")}</div>
      {fIdx(c.locations).map(function(x){var n=x.it,i=x.i;var open=n.showDesc!==false;return (
        <div key={i} className="nc">
          <span onClick={()=>toggleDesc("locations",i)} title={open?"Hide notes":"Show notes"} style={chevSt}>{open?"▾":"▸"}</span>
          <div style={{flex:1,minWidth:0}}>
            <input className="fi" value={n.nm||""} onChange={e=>ui("locations",i,"nm",e.target.value)} placeholder="Location name..." style={{marginBottom:6,width:"100%"}} />
            <input className="fi" value={n.rg||""} onChange={e=>ui("locations",i,"rg",e.target.value)} placeholder="Region / Type..." style={{marginBottom:6,width:"100%"}} />
            {open
              ?<MdField className="fi" value={n.nt||""} onChange={e=>ui("locations",i,"nt",e.target.value)} placeholder="Notes... (markdown supported)" style={{minHeight:64,width:"100%"}} />
              :collapsedRow("locations",i,n.nt)}
          </div>
          <button className="db" onClick={()=>window.__confirm("Delete this location?",()=>di("locations",i))}>x</button>
        </div>
      );})}
      <button className="arb" onClick={()=>ai("locations",{nm:"",rg:"",nt:""})}>+ Add Location</button>
      </div>}

      {sub==="lore"&&<div>
      <div className="sh">Lore {descBtns("lore")}</div>
      {fIdx(c.lore).map(function(x){var n=x.it,i=x.i;var open=n.showDesc!==false;return (
        <div key={i} className="nc" style={{borderLeft:"3px solid rgba(201,150,42,.35)"}}>
          <span onClick={()=>toggleDesc("lore",i)} title={open?"Hide notes":"Show notes"} style={chevSt}>{open?"▾":"▸"}</span>
          <div style={{flex:1,minWidth:0}}>
            <input className="fi" value={n.ti||""} onChange={e=>ui("lore",i,"ti",e.target.value)} placeholder="Title or subject..." style={{marginBottom:6,fontFamily:"'Cinzel',serif",fontSize:12,color:"var(--gold-l)"}} />
            {open
              ?<MdField className="fi" value={n.tx||""} onChange={e=>ui("lore",i,"tx",e.target.value)} placeholder="Lore, history, world details... (markdown supported)" style={{minHeight:64,width:"100%"}} />
              :collapsedRow("lore",i,n.tx)}
          </div>
          <button className="db" onClick={()=>window.__confirm("Delete this lore entry?",()=>di("lore",i))}>x</button>
        </div>
      );})}
      <button className="arb" onClick={()=>ai("lore",{ti:"",tx:""})}>+ Add Lore</button>
      </div>}

      {sub==="factions"&&<div>
      <div className="sh">Organisations {descBtns("factions")}</div>
      {fIdx(c.factions).map(function(x){var f=x.it,i=x.i;var open=f.showDesc!==false;return (
        <div key={i} className="nc">
          <span onClick={()=>toggleDesc("factions",i)} title={open?"Hide notes":"Show notes"} style={chevSt}>{open?"▾":"▸"}</span>
          <div style={{flex:1,minWidth:0}}>
            <input className="fi" value={f.nm||""} onChange={e=>{const a=[...(c.factions||[])];a[i]={...a[i],nm:e.target.value};s("factions",a);}} placeholder="Faction name..." style={{marginBottom:6,width:"100%"}} />
            <input className="fi" value={f.rl||""} onChange={e=>{const a=[...(c.factions||[])];a[i]={...a[i],rl:e.target.value};s("factions",a);}} placeholder="Relation / Rank..." style={{marginBottom:6,width:"100%"}} />
            {open
              ?<MdField className="fi" value={f.nt||""} onChange={e=>{const a=[...(c.factions||[])];a[i]={...a[i],nt:e.target.value};s("factions",a);}} placeholder="Notes... (markdown supported)" style={{minHeight:64,width:"100%"}} />

// ─── Dice rolling ─────────────────────────────────────────────────────────────
function rollN(s){return Math.floor(Math.random()*s)+1;}
function fmtMod(m){return m>=0?"+"+m:""+m;}
function abMod(score){return Math.floor((parseInt(score)-10)/2);}
const ABLS6=["STR","DEX","CON","INT","WIS","CHA"];
const SKILL_ABILITY={"Acrobatics":"DEX","Animal Handling":"WIS","Arcana":"INT","Athletics":"STR","Deception":"CHA","History":"INT","Insight":"WIS","Intimidation":"CHA","Investigation":"INT","Medicine":"WIS","Nature":"INT","Perception":"WIS","Performance":"CHA","Persuasion":"CHA","Religion":"INT","Sleight of Hand":"DEX","Stealth":"DEX","Survival":"WIS"};
// Pull every damage dice expression (and its type) out of an attack's text, so
// multi-part and conditional damage (e.g. "1d4+2 ... or 3d4+2", "1d6+2 plus 1d4")
// each become their own rollable entry.
function extractDamages(text){
  text=""+(text||"");
  var out=[],m,re=/(\d+)d(\d+)(\s*[+-]\s*\d+)?/g;
  while((m=re.exec(text))){
    var after=text.slice(m.index+m[0].length, m.index+m[0].length+40);
    var ty=after.match(/[)\s]*([A-Za-z]+)\s+damage/i);
    out.push({n:+m[1],sides:+m[2],bonus:m[3]?parseInt(m[3].replace(/\s+/g,"")):0,dtype:ty?ty[1].toLowerCase():""});
  }
  return out;
}
// Fallback: derive rollables straight from the saved display statblock markdown
// (used for combatants added before the structured creature object was stored).
function statblockRolls(md){
  md=""+(md||""); var groups=[];
  var abl=[],sav=[];
  ABLS6.forEach(function(a){
    var m=md.match(new RegExp("\\*\\*"+a+"\\*\\*\\s*\\d+\\s*\\|\\s*([+-]?\\d+)\\s*\\|\\s*([+-]?\\d+)","i"));
    if(m){abl.push({label:a,type:"d20",mod:parseInt(m[1])});sav.push({label:a+" save",type:"d20",mod:parseInt(m[2])});}
  });
  if(abl.length){groups.push({g:"Ability Checks",items:abl});groups.push({g:"Saving Throws",items:sav});}
  var sk=md.match(/\*\*Skills\*\*\s*([^\n]+)/i);
  if(sk){var items=[],re=/([A-Za-z][A-Za-z ]*?)\s*([+-]\d+)/g,m;while((m=re.exec(sk[1])))items.push({label:m[1].trim(),type:"d20",mod:parseInt(m[2])});if(items.length)groups.push({g:"Skills",items:items});}
  var atk=[],dmg=[],re2=/\*\*\*\s*([^*]+?)\s*\*\*\*\s*([\s\S]*?)(?=\*\*\*|###|$)/g,mm;
  while((mm=re2.exec(md))){
    var nm=mm[1].replace(/\.\s*$/,"").trim(),body=mm[2];
    var hm=body.match(/Attack Roll:?\s*([+-]\s*\d+)/i)||body.match(/([+-]\s*\d+)\s*to hit/i);
    if(hm)atk.push({label:nm,type:"d20",mod:parseInt(hm[1].replace(/\s+/g,""))});
    extractDamages(body).forEach(function(d){dmg.push({label:nm+(d.dtype?" ("+d.dtype+")":""),type:"dice",n:d.n,sides:d.sides,bonus:d.bonus});});
  }
  if(atk.length)groups.push({g:"Attacks",items:atk});
  if(dmg.length)groups.push({g:"Damage",items:dmg});
  return groups;
}
// Build every rollable thing for a combatant from its parsed statblock.
function creatureRolls(c){
  var groups=[{g:"General",items:[{label:"Initiative",type:"d20",mod:(c.dexMod||0)},{label:"d20",type:"d20",mod:0}]}];
  var cr=c.creature;
  if(cr&&cr.stats){
    var pb=parseInt(cr.pbFlat)||2, st=cr.stats;
    groups.push({g:"Ability Checks",items:ABLS6.map(function(a){return {label:a,type:"d20",mod:abMod(st[a])};})});
    var sp=cr.saveProficiencies||{};
    groups.push({g:"Saving Throws",items:ABLS6.map(function(a){return {label:a+" save",type:"d20",mod:abMod(st[a])+(sp[a]?pb:0)};})});
    var sk=cr.skillProficiencies||{};
    var skItems=Object.keys(sk).map(function(n){var ab=SKILL_ABILITY[n]||"DEX";return {label:n,type:"d20",mod:abMod(st[ab])+pb};});
    if(skItems.length) groups.push({g:"Skills",items:skItems});
    var atk=[],dmg=[];
    ["actions","bonusActions","reactions"].forEach(function(k){(cr[k]||[]).forEach(function(act){
      var desc=act.description||"";
      var atkB=act.atkFormula?parseInt(act.atkFormula.flat):NaN;
      if(isNaN(atkB)){var hm=desc.match(/Attack Roll:?\s*([+-]\s*\d+)/i)||desc.match(/([+-]\s*\d+)\s*to hit/i);if(hm)atkB=parseInt(hm[1].replace(/\s+/g,""));}
      if(!isNaN(atkB)) atk.push({label:act.nm,type:"d20",mod:atkB});
      var ds=extractDamages(desc);
      if(!ds.length&&act.dmgDice){var mm=(""+act.dmgDice).match(/(\d+)d(\d+)/);if(mm)ds=[{n:+mm[1],sides:+mm[2],bonus:act.dmgFormula?(parseInt(act.dmgFormula.flat)||0):0,dtype:act.dmgType||""}];}
      ds.forEach(function(d){dmg.push({label:act.nm+(d.dtype?" ("+d.dtype+")":""),type:"dice",n:d.n,sides:d.sides,bonus:d.bonus});});
    });});
    if(atk.length) groups.push({g:"Attacks",items:atk});
    if(dmg.length) groups.push({g:"Damage",items:dmg});
  } else if(c.statblockMd){
    groups=groups.concat(statblockRolls(c.statblockMd));
  }
  return groups;
}
function rollItem(it){
  if(it.type==="dice"){var rs=[],t=0;for(var i=0;i<it.n;i++){var x=rollN(it.sides);rs.push(x);t+=x;}return {total:t+(it.bonus||0),detail:it.n+"d"+it.sides+"["+rs.join(",")+"]"+(it.bonus?fmtMod(it.bonus):"")};}
  var d=rollN(20);return {total:d+(it.mod||0),detail:"d20("+d+")"+(it.mod?fmtMod(it.mod):"")};
}
// Parse & roll a free-form expression like "2d6 + 1d8 + 3 - 1d4" (or "d20+5").
function rollExpression(expr){
  var s=(""+(expr||"")).replace(/\s+/g,"");
  if(!s) return null;
  var terms=s.match(/[+-]?[^+-]+/g);
  if(!terms) return null;
  var total=0, parts=[];
  for(var i=0;i<terms.length;i++){
    var sign=1, t=terms[i];
    if(t[0]==="+"){t=t.slice(1);} else if(t[0]==="-"){sign=-1;t=t.slice(1);}
    var dm=t.match(/^(\d*)d(\d+)$/i);
    if(dm){
      var n=parseInt(dm[1]||"1"), sides=parseInt(dm[2]);
      if(!sides||n<1||n>500) return null;
      var rs=[],sub=0;
      for(var j=0;j<n;j++){var x=rollN(sides);rs.push(x);sub+=x;}
      total+=sign*sub;
      parts.push((sign<0?"−":(parts.length?"+":""))+n+"d"+sides+"["+rs.join(",")+"]");
    } else if(/^\d+$/.test(t)){
      total+=sign*parseInt(t);
      parts.push((sign<0?"−":(parts.length?"+":""))+t);
    } else { return null; }
  }
  return {total:total, detail:parts.join("")};
}

// ─── Combat Tracker ───────────────────────────────────────────────────────────
function sortOrder(cs){return cs.slice().sort(function(a,b){var ai=a.init==null?-999:a.init,bi=b.init==null?-999:b.init;if(bi!==ai)return bi-ai;if((b.dexMod||0)!==(a.dexMod||0))return (b.dexMod||0)-(a.dexMod||0);return (a.name||"").localeCompare(b.name||"");});}
function tickTimers(list){return (list||[]).map(function(t){return t.timer==null?t:Object.assign({},t,{timer:t.timer-1});}).filter(function(t){return t.timer==null||t.timer>0;});}

function CombatTracker({combat,setCombat,setLightbox,onAddCreature}){
  const order=sortOrder(combat.combatants||[]);
  const [rolls,setRolls]=useState([]);
  const [roller,setRoller]=useState(null);
  const [customExpr,setCustomExpr]=useState("");
  const [customErr,setCustomErr]=useState(false);
  const [flash,setFlash]=useState(null);
  const flashTimer=useRef(null);
  const showFlash=function(entry){setFlash(entry);if(flashTimer.current)clearTimeout(flashTimer.current);flashTimer.current=setTimeout(function(){setFlash(null);},3500);};
  const pushRoll=function(entry){setRolls(function(p){return [entry,...p].slice(0,20);});showFlash(entry);};
  const rollCustom=function(){var r=rollExpression(customExpr);if(!r){setCustomErr(true);return;}setCustomErr(false);pushRoll({id:uid(),name:"Custom",label:customExpr.trim(),detail:r.detail,total:r.total});};
  const doRoll=function(name,it){var r=rollItem(it);pushRoll({id:uid(),name:name,label:it.label,detail:r.detail,total:r.total});};
  const openRoller=function(id){setRoller(function(p){return {id:id,x:p?p.x:Math.max(8,Math.round(window.innerWidth/2)-150),y:p?p.y:90};});};
  const setRollerPos=function(pos){setRoller(function(p){return p?Object.assign({},p,{x:pos.x,y:pos.y}):p;});};
  const upd=function(id,patch){setCombat(function(p){return Object.assign({},p,{combatants:(p.combatants||[]).map(function(c){return c.id===id?Object.assign({},c,typeof patch==="function"?patch(c):patch):c;})});});};
  const setAllExpanded=function(v){setCombat(function(p){return Object.assign({},p,{combatants:(p.combatants||[]).map(function(c){return Object.assign({},c,{expanded:v&&!!c.statblockMd});})});});};
  const remove=function(id){setCombat(function(p){return Object.assign({},p,{combatants:(p.combatants||[]).filter(function(c){return c.id!==id;}),turnId:p.turnId===id?null:p.turnId});});};
  const rollInitSet=function(onlyCreatures){
    var logs=[];
    var nc=(combat.combatants||[]).map(function(c){
      if(onlyCreatures&&c.type!=="creature") return c;
      var d=rollN(20), t=d+(c.dexMod||0);
      logs.push({id:uid(),name:c.name,label:"Initiative",detail:"d20("+d+")"+fmtMod(c.dexMod||0),total:t});
      return Object.assign({},c,{init:t});
    });
    setCombat(Object.assign({},combat,{combatants:nc}));
    setRolls(logs.concat(rolls).slice(0,20));
    if(logs.length) showFlash({id:uid(),name:"Initiative",label:"rolled — "+logs.length+(logs.length===1?" combatant":" combatants"),detail:"",total:null});
  };
  const rollCreatures=function(){rollInitSet(true);};
  const rollAll=function(){rollInitSet(false);};

  const startCombat=function(){if(!order.length)return;setCombat(function(p){return Object.assign({},p,{started:true,round:1,turnId:sortOrder(p.combatants||[])[0].id});});};
  const resetCombat=function(){setCombat(function(p){return Object.assign({},p,{started:false,round:1,turnId:null});});};
  const nextTurn=function(){
    setCombat(function(p){
      var ord=sortOrder(p.combatants||[]); if(!ord.length) return p;
      var idx=ord.findIndex(function(c){return c.id===p.turnId;});
      var ni=idx+1, round=p.round||1;
      if(ni>=ord.length){ni=0;round++;}
      var nextC=ord[ni];
      var combatants=(p.combatants||[]).map(function(c){return c.id!==nextC.id?c:Object.assign({},c,{conditions:tickTimers(c.conditions),spells:tickTimers(c.spells)});});
      return Object.assign({},p,{combatants:combatants,turnId:nextC.id,round:round,started:true});
    });
  };
  const addPC=function(pc){setCombat(function(p){return Object.assign({},p,{combatants:[...(p.combatants||[]),pc]});});};
  return <div style={{maxWidth:780,margin:"0 auto"}}>

// Paste a creature's Markdown statblock and drop it straight into combat — same
// parser the Compendium uses on creatures.md, so it works with no network/repo.
function AddCreatureMdForm({onAdd}){
  const [open,setOpen]=useState(false);
  const [md,setMd]=useState("");
  const [err,setErr]=useState("");
  const PH="# Goblin\n*Small humanoid, neutral evil*\n___\n**Armor Class** 15 (leather armor, shield)\n**Hit Points** 7 (2d6)\n**Speed** 30 ft.\n___\n| STR | DEX | CON | INT | WIS | CHA |\n|:---:|:---:|:---:|:---:|:---:|:---:|\n| 8 (-1) | 14 (+2) | 10 (+0) | 10 (+0) | 8 (-1) | 8 (-1) |\n___\n**Skills** Stealth +6\n**Senses** darkvision 60 ft.\n**Challenge** 1/4\n### Actions\n***Scimitar.*** Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 5 (1d6 + 2) slashing damage.";
  const submit=function(){
    var entries=parseCreaturesFromText(md);
    if(!entries.length){setErr("Couldn't find a statblock. Paste a GMBinder-style creature — it needs a name heading (# Name), an **Armor Class** / **Hit Points** line, and the STR/DEX/… ability table.");return;}
    setErr("");
    entries.forEach(function(r){
      var _vs=expandCreatureVariants(r.creature||{});
      var _add=(_vs&&_vs.length)?_vs:[r.creature];
      _add.forEach(function(v){var nc=JSON.parse(JSON.stringify(v));_applySummonClass(nc,0);onAdd(Object.assign({},r,{name:nc.nm||r.name,creature:nc}));});
    });
    setMd("");setOpen(false);
  };
  if(!open) return <div onClick={function(){setOpen(true);}} style={Object.assign(btn("123,79,207"),{display:"inline-block",marginTop:10,marginLeft:8})}>+ Add Creature from Markdown</div>;
  return <div style={{marginTop:12,padding:"12px 14px",border:"1px dashed rgba(123,79,207,.4)",borderRadius:4}}>
    <div style={Object.assign({},lbl,{marginBottom:6})}>Paste a creature statblock (Markdown) — works offline</div>
    <textarea value={md} onChange={function(e){setMd(e.target.value);setErr("");}} placeholder={PH} spellCheck={false} style={Object.assign({},inp,{width:"100%",minHeight:150,fontFamily:"'Courier New',monospace",fontSize:12,lineHeight:1.5,resize:"vertical"})} autoFocus/>
    {err&&<div style={{marginTop:6,fontFamily:"'EB Garamond',serif",fontSize:12,color:"#e07060"}}>{err}</div>}
    <div style={{marginTop:10,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
      <div onClick={submit} style={btn("123,79,207")}>Add to Combat</div>
      <div onClick={function(){setMd("");setErr("");setOpen(false);}} style={btn("232,213,176")}>Cancel</div>
      <span style={{fontFamily:"'EB Garamond',serif",fontSize:11,fontStyle:"italic",color:"rgba(232,213,176,.4)"}}>Read exactly like the Compendium — pulls attacks, saves, skills & the dice roller. Paste several at once and each becomes its own combatant.</span>
    </div>
  </div>;
}

// ─── App shell ────────────────────────────────────────────────────────────────
function App(){
  const NOTE_KEYS=["npc","locations","lore","factions","nt1","nt3","customSections"];
  const [tab,setTab]=useState("combat");
  const [notes,setNotes]=useState({npc:[],locations:[],lore:[],factions:[],nt1:[],nt3:[],customSections:[]});
  const [combat,setCombat]=useState({round:1,turnId:null,started:false,combatants:[]});
  const [lightbox,setLightbox]=useState(null);
  const [confirmState,setConfirmState]=useState({open:false,message:"",onConfirm:null});
  const fileRef=useRef(null);
  const fileHandle=useRef(null);
  const [theme,setTheme]=useState(function(){try{return localStorage.getItem("dnd5e_theme")||"dark";}catch(e){return "dark";}});
  useEffect(function(){document.documentElement.classList.toggle("light-theme",theme==="light");try{localStorage.setItem("dnd5e_theme",theme);}catch(e){}},[theme]);
  const toggleTheme=function(){setTheme(function(t){return t==="light"?"dark":"light";});};
  const [saveMsg,setSaveMsg]=useState("");
  const flashSave=function(m){setSaveMsg(m);setTimeout(function(){setSaveMsg("");},2600);};
  const [addMsg,setAddMsg]=useState(null);
  const addTimer=useRef(null);
  const flashAdd=function(name){setAddMsg({name:name,id:Date.now()+Math.random()});if(addTimer.current)clearTimeout(addTimer.current);addTimer.current=setTimeout(function(){setAddMsg(null);},1600);};
  const loaded=useRef(false);
  const notesS=function(k,v){setNotes(function(prev){var nv=typeof v==="function"?v(prev[k]):v;return Object.assign({},prev,{[k]:nv});});};
  useEffect(function(){
    window.__confirm=function(message,onConfirm,confirmLabel){setConfirmState({open:true,message:message,onConfirm:onConfirm,confirmLabel:confirmLabel});};
    var s=loadState();
    if(s.combat)setCombat(s.combat);
    var n=(s.notes&&typeof s.notes==="object")?s.notes:null;
    if(!n){
      n={npc:[],locations:[],lore:[],factions:[],nt1:[],nt3:[],customSections:[]};
      if(s.codex&&s.codex.cats){n.customSections=s.codex.cats.map(function(cat){return {id:cat.id||(Date.now()+Math.random()),name:cat.name||"Section",items:(cat.entries||[]).map(function(e){return {ti:e.ti||e.title||"",tx:e.tx||e.body||"",showDesc:e.open!==false};})};});}
      else if(typeof s.notes==="string"&&s.notes.trim()){n.nt1=[{ti:"Imported notes",tx:s.notes}];}
    }
    NOTE_KEYS.forEach(function(k){if(!Array.isArray(n[k]))n[k]=[];});
    setNotes(n);loaded.current=true;
  },[]);
  useEffect(function(){if(loaded.current)saveState({notes:notes,combat:combat});},[notes,combat]);
  const addToCombat=function(entry){setCombat(function(p){var base=entry.name||"Creature";var existing=(p.combatants||[]).filter(function(c){return c.name===base||c.name.indexOf(base+" ")===0;}).length;var nc=entryToCombatant(entry);if(existing>0)nc.name=base+" "+(existing+1);return Object.assign({},p,{combatants:[...(p.combatants||[]),nc]});});flashAdd(entry.name||"Creature");};
  const doSave=async function(){
    var json=JSON.stringify({version:"dm1",notes:notes,combat:combat},null,2);
    var fileName="dm_screen.json";
    var blob=new Blob([json],{type:"application/json"});
    var pickerOpts={suggestedName:fileName,types:[{description:"DM Screen JSON",accept:{"application/json":[".json"]}}]};
    // Desktop Chrome/Edge: native Save-As picker (choose folder + name), remembers file for re-save
    if(window.showSaveFilePicker){
      try{
        var handle=fileHandle.current;
        if(!handle){handle=await window.showSaveFilePicker(pickerOpts);fileHandle.current=handle;}
        var w=await handle.createWritable();await w.write(json);await w.close();
        flashSave("Saved to "+handle.name);return;
      }catch(e){
        if(e&&e.name==="AbortError")return; // user cancelled
        if(fileHandle.current){ // stale handle — ask for a new location once
          fileHandle.current=null;
          try{var h2=await window.showSaveFilePicker(pickerOpts);fileHandle.current=h2;var w2=await h2.createWritable();await w2.write(json);await w2.close();flashSave("Saved to "+h2.name);return;}
          catch(e2){if(e2&&e2.name==="AbortError")return;}
        }
        // otherwise fall through to share/download
      }
    }
    // Mobile: Web Share sheet (lets you pick a destination app/location)
    try{
      var shareFile=new File([blob],fileName,{type:"application/json"});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[shareFile]})){
        await navigator.share({files:[shareFile],title:fileName});flashSave("Saved");return;
      }
    }catch(e){if(e&&(e.name==="AbortError"||e.name==="NotAllowedError"))return;}
    // Fallback: classic download
    try{var u=URL.createObjectURL(blob);var el=document.createElement("a");el.href=u;el.download=fileName;document.body.appendChild(el);el.click();document.body.removeChild(el);setTimeout(function(){URL.revokeObjectURL(u);},1000);flashSave("Downloaded");}
    catch(err){alert("Save failed: "+err.message);}
  };
  const doSaveAs=function(){fileHandle.current=null;doSave();};
  const doImport=function(ev){var f=ev.target.files&&ev.target.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){try{var d=JSON.parse(rd.result);window.__confirm("Load this file? It will replace your current combat and notes.",function(){if(d.combat)setCombat(d.combat);if(d.notes&&typeof d.notes==="object"){var n=d.notes;NOTE_KEYS.forEach(function(k){if(!Array.isArray(n[k]))n[k]=[];});setNotes(n);}},"Load");}catch(e){alert("Invalid JSON file: "+e.message);}};rd.readAsText(f);ev.target.value="";};
  const tabBtn=function(id,label,col){var on=tab===id;return <div onClick={function(){setTab(id);}} style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:1.5,textTransform:"uppercase",padding:"8px 18px",borderRadius:2,userSelect:"none",border:"1px solid rgba("+col+",."+(on?"7":"25")+")",color:on?"rgba("+col+",1)":"rgba(232,213,176,.5)",background:on?"rgba("+col+",.15)":"transparent"}}>{label}</div>;};
  return <div style={{minHeight:"100vh",padding:"16px 14px 60px"}}>
    <style>{CSS}</style>
    <div style={{maxWidth:980,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18,flexWrap:"wrap"}}>
        <div style={{flex:1,display:"flex",alignItems:"baseline",gap:8}}><span style={{fontFamily:"'Cinzel Decorative',cursive",fontSize:18,color:GOLDL,letterSpacing:1}}>Dungeon Master Screen</span><span style={{fontFamily:"'EB Garamond',serif",fontSize:11,color:"rgba(232,213,176,.35)"}}>v15</span></div>
        <div onClick={doSave} style={btn("201,150,42")} title="Save everything to a JSON file (choose location & name)">Save</div>
        <div onClick={doSaveAs} style={btn("201,150,42")} title="Save to a new file / location">Save As</div>
        <div onClick={function(){if(fileRef.current)fileRef.current.click();}} style={btn("201,150,42")} title="Load from a JSON file">Load</div>
        <div onClick={toggleTheme} style={btn("232,213,176")} title="Toggle light / dark theme">{theme==="light"?"☀ Dark":"☾ Light"}</div>
        {saveMsg&&<span style={{fontFamily:"'EB Garamond',serif",fontSize:11,color:"rgba(143,214,160,.9)",marginLeft:4}}>{saveMsg}</span>}
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:22,marginBottom:20,flexWrap:"wrap"}}>
        {tabBtn("combat","Combat","123,79,207")}
        {tabBtn("compendium","Compendium","201,150,42")}
        {tabBtn("codex","Codex","74,156,92")}
      </div>
    </div>
    <div style={{display:tab==="combat"?"block":"none"}}><CombatTracker combat={combat} setCombat={setCombat} setLightbox={setLightbox} onAddCreature={addToCombat}/></div>
    {tab==="compendium"&&<div style={{maxWidth:980,margin:"0 auto"}}><CompendiumPage onAddCreature={addToCombat}/></div>}
    {tab==="codex"&&<div style={{maxWidth:980,margin:"0 auto"}}><Page4 c={notes} s={notesS}/></div>}
    <datalist id="cond-list">{COMMON_CONDITIONS.map(function(x){return <option key={x} value={x}/>;})}</datalist>
    {lightbox&&<div onClick={function(){setLightbox(null);}} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.9)",zIndex:100001,display:"flex",alignItems:"center",justifyContent:"center",padding:20,cursor:"zoom-out"}}><img src={lightbox} style={{maxWidth:"95vw",maxHeight:"95vh",objectFit:"contain"}}/></div>}
    {addMsg&&<div style={{position:"fixed",top:64,left:"50%",transform:"translateX(-50%)",zIndex:100002,pointerEvents:"none",maxWidth:"92vw"}}>
      <div key={addMsg.id} style={{animation:"dmPop .2s ease-out",display:"flex",alignItems:"center",gap:10,padding:"10px 18px",borderRadius:8,background:"rgba(28,21,16,.97)",border:"1px solid rgba(123,79,207,.55)",boxShadow:"0 8px 30px rgba(0,0,0,.6)"}}>
        <span style={{fontSize:17}}>⚔️</span>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:14,color:ARCL,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{addMsg.name} added to combat</span>
      </div>
    </div>}
    {confirmState.open&&<ConfirmModal message={confirmState.message} confirmLabel={confirmState.confirmLabel} onYes={function(){if(confirmState.onConfirm)confirmState.onConfirm();setConfirmState({open:false,message:"",onConfirm:null});}} onNo={function(){setConfirmState({open:false,message:"",onConfirm:null});}}/>}
    <input type="file" accept="application/json,.json" ref={fileRef} style={{display:"none"}} onChange={doImport}/>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
</body></html>
